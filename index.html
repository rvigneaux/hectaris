<style>

/* =====================================================================

   HECTARIS — Assolement & Prévision de campagne

   Design tokens

   ===================================================================== */

:root{

  --ink:#20272C; --ink-2:#2A333B; --ink-3:#39434C;

  --paper:#F3F4F1; --card:#FFFFFF; --line:#E3E6E0; --line-2:#EEF0EC;

  --tx:#242B31; --tx-2:#5C6670; --tx-3:#8B949C;

  --orange:#F57C00; --orange-d:#D96C00; --orange-bg:#FDF1E3;

  --green:#2E7D32; --green-bg:#E8F3E9;

  --amber:#E6A700; --amber-bg:#FBF3DB;

  --red:#C62828; --red-bg:#FBE9E9;

  --blue:#2C6E9E;

  --r:14px; --r-s:9px;

  --sh:0 1px 2px rgba(24,30,36,.05),0 4px 14px rgba(24,30,36,.05);

  --sh-2:0 8px 30px rgba(24,30,36,.14);

  --sb:236px;

  font-size:15px;

}

*{margin:0;padding:0;box-sizing:border-box}

html,body{height:100%}

body{

  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;

  background:var(--paper); color:var(--tx); -webkit-font-smoothing:antialiased;

}

button{font:inherit;cursor:pointer;border:none;background:none;color:inherit}

input,select,textarea{font:inherit;color:inherit}

::selection{background:#F5CFA6}



/* ---------- Shell ---------- */

#app{display:flex;min-height:100vh}

.sidebar{

  width:var(--sb);background:var(--ink);color:#C6CDD3;position:fixed;inset:0 auto 0 0;

  display:flex;flex-direction:column;z-index:40;transition:transform .25s ease;

}

.logo{display:flex;align-items:center;gap:11px;padding:20px 18px 16px}

.logo-mark{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--orange),#FFA040);

  display:grid;place-items:center;color:#fff;font-weight:800;font-size:17px;letter-spacing:-.5px}

.logo b{color:#fff;font-size:16.5px;letter-spacing:-.2px;display:block;line-height:1.1}

.logo span{font-size:11px;color:#7E8890;letter-spacing:.4px}

.nav{flex:1;padding:6px 10px;overflow-y:auto}

.nav-sec{font-size:10.5px;letter-spacing:1.2px;text-transform:uppercase;color:#67717A;padding:16px 10px 6px}

.nav a{display:flex;align-items:center;gap:11px;padding:8.5px 10px;border-radius:8px;color:#C6CDD3;

  text-decoration:none;font-size:14px;font-weight:500;margin:1px 0;transition:background .15s,color .15s}

.nav a svg{width:17px;height:17px;flex:none;opacity:.75}

.nav a:hover{background:var(--ink-2);color:#fff}

.nav a.on{background:var(--ink-3);color:#fff;box-shadow:inset 3px 0 0 var(--orange)}

.nav a.on svg{opacity:1;color:var(--orange)}

.side-foot{padding:12px 16px;border-top:1px solid #333D45;font-size:11.5px;color:#7E8890}

.side-foot b{color:#AEB7BE}



.main{flex:1;margin-left:var(--sb);display:flex;flex-direction:column;min-width:0}

.topbar{

  position:sticky;top:0;z-index:30;background:rgba(243,244,241,.86);backdrop-filter:blur(10px);

  border-bottom:1px solid var(--line);padding:12px 28px;display:flex;align-items:center;gap:14px;

}

.burger{display:none;width:36px;height:36px;border-radius:8px;align-items:center;justify-content:center}

.burger:hover{background:var(--line-2)}

.crumb{font-size:19px;font-weight:750;letter-spacing:-.4px}

.topbar .grow{flex:1}

.camp-pill{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--line);

  border-radius:99px;padding:5px 6px 5px 14px;box-shadow:var(--sh);font-weight:600;font-size:13.5px}

.camp-pill select{border:none;background:var(--ink);color:#fff;border-radius:99px;padding:4px 10px;font-weight:700;outline:none}

.save-dot{font-size:12px;color:var(--tx-3);display:flex;align-items:center;gap:6px}

.save-dot i{width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block}



/* ruban d'assolement — signature */

.strip{height:7px;display:flex;overflow:hidden}

.strip i{height:100%;transition:width .5s ease}



.content{padding:26px 28px 60px;max-width:1340px;width:100%;margin:0 auto;animation:pop .25s ease}

@keyframes pop{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}

@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}



/* ---------- Composants ---------- */

.page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:20px;flex-wrap:wrap}

.page-head h1{font-size:24px;font-weight:800;letter-spacing:-.6px}

.page-head p{color:var(--tx-2);font-size:13.5px;margin-top:4px;max-width:640px}

.actions{display:flex;gap:9px;flex-wrap:wrap}

.btn{display:inline-flex;align-items:center;gap:7px;border-radius:9px;padding:8px 14px;font-weight:650;font-size:13.5px;

  background:var(--card);border:1px solid var(--line);box-shadow:var(--sh);transition:transform .12s,box-shadow .12s}

.btn:hover{transform:translateY(-1px);box-shadow:var(--sh-2)}

.btn:active{transform:none}

.btn svg{width:15px;height:15px}

.btn.pri{background:var(--orange);border-color:var(--orange);color:#fff}

.btn.pri:hover{background:var(--orange-d)}

.btn.grn{background:var(--green);border-color:var(--green);color:#fff}

.btn.ghost{box-shadow:none;background:transparent}

.btn.danger{color:var(--red)}

.btn.sm{padding:4px 9px;font-size:12.5px;border-radius:7px}



.grid{display:grid;gap:16px}

.g4{grid-template-columns:repeat(4,1fr)} .g3{grid-template-columns:repeat(3,1fr)} .g2{grid-template-columns:repeat(2,1fr)}

@media(max-width:1100px){.g4{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(2,1fr)}}

@media(max-width:640px){.g4,.g3,.g2{grid-template-columns:1fr}}



.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh)}

.card .hd{padding:15px 18px 0;display:flex;align-items:center;justify-content:space-between;gap:10px}

.card .hd h2{font-size:15px;font-weight:750;letter-spacing:-.2px}

.card .hd .sub{font-size:12px;color:var(--tx-3)}

.card .bd{padding:16px 18px 18px}



.kpi{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh);padding:15px 17px;

  position:relative;overflow:hidden}

.kpi::before{content:"";position:absolute;inset:0 auto 0 0;width:4px;background:var(--k,var(--orange))}

.kpi .l{font-size:11px;letter-spacing:.9px;text-transform:uppercase;color:var(--tx-3);font-weight:700}

.kpi .v{font-size:25px;font-weight:800;letter-spacing:-.8px;margin-top:5px;font-variant-numeric:tabular-nums}

.kpi .s{font-size:12px;color:var(--tx-2);margin-top:3px}



table.tb{width:100%;border-collapse:collapse;font-size:13.5px}

.tb th{font-size:11px;text-transform:uppercase;letter-spacing:.7px;color:var(--tx-3);font-weight:700;

  text-align:left;padding:9px 10px;border-bottom:1px solid var(--line);background:#FAFBF9;white-space:nowrap}

.tb td{padding:8px 10px;border-bottom:1px solid var(--line-2);vertical-align:middle;font-variant-numeric:tabular-nums}

.tb tr:hover td{background:#FAFAF7}

.tb .num{text-align:right}

.tb th.num{text-align:right}

.tb .tot td{font-weight:750;background:#F5F6F2;border-top:2px solid var(--line)}

.tb-wrap{overflow-x:auto;border-radius:0 0 var(--r) var(--r)}

.tb input,.tb select{border:1px solid transparent;background:transparent;border-radius:6px;padding:4px 6px;width:100%;

  min-width:52px;outline:none;transition:border .15s,background .15s;font-variant-numeric:tabular-nums}

.tb input:hover,.tb select:hover{border-color:var(--line)}

.tb input:focus,.tb select:focus{border-color:var(--orange);background:#FFF;box-shadow:0 0 0 3px rgba(245,124,0,.12)}

.tb input.num{text-align:right}

.tb input.ed,.tb select.ed{color:var(--blue);font-weight:600}

.calc{color:var(--tx);font-weight:600}

.muted{color:var(--tx-3)}



.chip{display:inline-flex;align-items:center;gap:6px;border-radius:99px;padding:2.5px 10px;font-size:12px;font-weight:700}

.chip i{width:8px;height:8px;border-radius:50%;background:currentColor}

.sig-g{background:var(--green-bg);color:var(--green)} .sig-a{background:var(--amber-bg);color:#9A7100}

.sig-r{background:var(--red-bg);color:var(--red)} .sig-n{background:var(--line-2);color:var(--tx-2)}

.tag{display:inline-block;border-radius:6px;padding:2px 8px;font-size:11.5px;font-weight:700;background:var(--line-2);color:var(--tx-2)}



.field{display:flex;flex-direction:column;gap:5px;margin-bottom:13px}

.field label{font-size:12px;font-weight:700;color:var(--tx-2)}

.field input,.field select,.field textarea{border:1px solid var(--line);border-radius:8px;padding:8px 11px;background:#fff;outline:none}

.field input:focus,.field select:focus{border-color:var(--orange);box-shadow:0 0 0 3px rgba(245,124,0,.12)}

.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}

@media(max-width:560px){.frow{grid-template-columns:1fr}}



/* modal */

.overlay{position:fixed;inset:0;background:rgba(24,30,36,.45);z-index:80;display:grid;place-items:center;padding:20px;

  animation:fade .18s ease}

@keyframes fade{from{opacity:0}to{opacity:1}}

.modal{background:#fff;border-radius:16px;box-shadow:var(--sh-2);width:min(560px,100%);max-height:90vh;overflow:auto;

  animation:pop .22s ease}

.modal .m-hd{padding:18px 20px 4px;display:flex;justify-content:space-between;align-items:center}

.modal .m-hd h3{font-size:17px;font-weight:800;letter-spacing:-.3px}

.modal .m-bd{padding:14px 20px 4px}

.modal .m-ft{padding:12px 20px 18px;display:flex;justify-content:flex-end;gap:9px}

.x{width:32px;height:32px;border-radius:8px;display:grid;place-items:center;color:var(--tx-3)}

.x:hover{background:var(--line-2);color:var(--tx)}



.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;

  padding:10px 18px;border-radius:99px;font-size:13.5px;font-weight:600;z-index:99;box-shadow:var(--sh-2);

  animation:toast 2.6s ease forwards}

@keyframes toast{0%{opacity:0;transform:translate(-50%,10px)}10%,85%{opacity:1;transform:translate(-50%,0)}100%{opacity:0}}



.empty{padding:40px;text-align:center;color:var(--tx-3)}

.empty b{display:block;color:var(--tx-2);font-size:15px;margin-bottom:5px}

.legend{display:flex;flex-wrap:wrap;gap:12px;font-size:12.5px;color:var(--tx-2)}

.legend span{display:inline-flex;align-items:center;gap:6px}

.legend i{width:10px;height:10px;border-radius:3px}

.bar-row{display:grid;grid-template-columns:130px 1fr 92px;align-items:center;gap:10px;margin:7px 0;font-size:13px}

.bar-row .tr{height:9px;border-radius:99px;background:var(--line-2);overflow:hidden}

.bar-row .tr i{display:block;height:100%;border-radius:99px;transition:width .5s ease}

.bar-row .vv{text-align:right;font-weight:700;font-variant-numeric:tabular-nums}

.hint{font-size:12.5px;color:var(--tx-3);margin-top:9px}

.hint b{color:var(--tx-2)}

.seg{display:inline-flex;background:var(--line-2);border-radius:9px;padding:3px;gap:2px}

.seg button{padding:5px 13px;border-radius:7px;font-size:13px;font-weight:650;color:var(--tx-2)}

.seg button.on{background:#fff;color:var(--tx);box-shadow:var(--sh)}

.check{width:16px;height:16px;accent-color:var(--orange)}



/* ---------- Interventions : programmes, statuts, planning ---------- */

.stchip{display:inline-flex;align-items:center;gap:5px;border-radius:99px;padding:2px 9px;font-size:11.5px;font-weight:700}

.st-Prévue{background:var(--line-2);color:var(--tx-2)} .st-Àconfirmer{background:var(--amber-bg);color:#9A7100}

.st-Commandée{background:#E3EEF6;color:var(--blue)} .st-Àréaliser{background:var(--orange-bg);color:var(--orange-d)}

.st-Encours{background:#E3EEF6;color:var(--blue)} .st-Réalisée{background:var(--green-bg);color:var(--green)}

.st-Annulée{background:var(--red-bg);color:var(--red);text-decoration:line-through}

.period-h{display:flex;align-items:center;gap:10px;margin:22px 0 10px;font-size:16px;font-weight:800;letter-spacing:-.3px}

.period-h .tag{font-weight:700}

.pgcard{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh);margin-bottom:12px;overflow:hidden}

.pgcard .p-hd{padding:12px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;border-bottom:1px solid var(--line-2)}

.pgcard .p-hd b{font-size:14.5px}

.pgcard .p-meta{font-size:12.5px;color:var(--tx-2)}

.pgcard .p-act{margin-left:auto;display:flex;gap:6px;flex-wrap:wrap}

.pgcard .p-real{background:var(--green-bg);padding:9px 16px;font-size:12.5px;border-top:1px solid var(--line-2)}

.filters{display:flex;gap:8px;flex-wrap:wrap;align-items:center;background:var(--card);border:1px solid var(--line);

  border-radius:var(--r);box-shadow:var(--sh);padding:10px 12px;margin-bottom:14px}

.filters select{border:1px solid var(--line);border-radius:8px;padding:6px 9px;background:#fff;font-size:13px;max-width:170px}

.filters .lbl{font-size:11px;text-transform:uppercase;letter-spacing:.7px;color:var(--tx-3);font-weight:700}

.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}

.cal .dayh{font-size:11px;text-transform:uppercase;color:var(--tx-3);font-weight:700;text-align:center;padding:4px 0}

.cal .day{min-height:82px;background:var(--card);border:1px solid var(--line);border-radius:9px;padding:5px 6px;font-size:12px}

.cal .day.off{opacity:.4}

.cal .dnum{font-weight:700;color:var(--tx-3);font-size:11px}

.cal .ev{background:var(--orange-bg);border-left:3px solid var(--orange);border-radius:5px;padding:2px 5px;margin-top:3px;

  font-size:11px;font-weight:600;cursor:pointer;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}

.alertbox{background:var(--amber-bg);border:1px solid #EAD489;border-radius:var(--r);padding:11px 15px;font-size:13px;margin-bottom:14px}

.alertbox b{display:block;margin-bottom:4px}

.alertbox ul{margin-left:18px}

.miss{color:var(--red);font-weight:700;font-size:12px}

.lines-ed .row{display:grid;grid-template-columns:1.4fr 1fr 78px 1fr 30px;gap:8px;margin-bottom:7px;align-items:center}

.pk-list{max-height:180px;overflow:auto;border:1px solid var(--line);border-radius:9px;padding:8px 10px;

  display:grid;grid-template-columns:1fr 1fr;gap:3px 12px;font-size:13px}

.pk-list label{display:flex;gap:7px;align-items:center;cursor:pointer}

@media(max-width:920px){

  .sidebar{transform:translateX(-100%)}

  .sidebar.open{transform:none;box-shadow:var(--sh-2)}

  .main{margin-left:0}

  .burger{display:inline-flex}

  .content{padding:18px 14px 60px}

  .crumb{font-size:16px}

}

body::after{content:none}

@media print{

  body::after{content:"© 2026 Renaud Vigneaux — EARL Vigneaux · Hectaris — Tous droits réservés · Reproduction interdite sans autorisation";

    display:block;position:fixed;bottom:6px;left:0;right:0;text-align:center;font-size:9px;color:#8B949C}

  .sidebar,.topbar,.actions,.no-print{display:none!important}

  .main{margin:0} .content{max-width:none;padding:0}

  .card{box-shadow:none;break-inside:avoid;margin-bottom:14px}

  body{background:#fff}

}

</style>

</head>
