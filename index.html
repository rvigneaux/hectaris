<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hectaris — Assolement & Prévision de campagne</title>
<style>
/* =====================================================================
   HECTARIS — Assolement & Prévision de campagne
   Design tokens
   ===================================================================== */
:root{
  --ink:#20272C; --ink-2:#2A333B; --ink-3:#39434C;
  --paper:#F3F4F1; --card:#FFFFFF; --line:#E3E6E0; --line-2:#EEF0EC;
  --tx:#242B31; --tx-2:#5C6670; --tx-3:#8B949C;
  --orange:#F57C00; --orange-d:#D96C00; --orange-bg:#FDF1E3;
  --green:#2E7D32; --green-bg:#E8F3E9;
  --amber:#E6A700; --amber-bg:#FBF3DB;
  --red:#C62828; --red-bg:#FBE9E9;
  --blue:#2C6E9E;
  --r:14px; --r-s:9px;
  --sh:0 1px 2px rgba(24,30,36,.05),0 4px 14px rgba(24,30,36,.05);
  --sh-2:0 8px 30px rgba(24,30,36,.14);
  --sb:236px;
  font-size:15px;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  background:var(--paper); color:var(--tx); -webkit-font-smoothing:antialiased;
}
button{font:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font:inherit;color:inherit}
::selection{background:#F5CFA6}

/* ---------- Shell ---------- */
#app{display:flex;min-height:100vh}
.sidebar{
  width:var(--sb);background:var(--ink);color:#C6CDD3;position:fixed;inset:0 auto 0 0;
  display:flex;flex-direction:column;z-index:40;transition:transform .25s ease;
}
.logo{display:flex;align-items:center;gap:11px;padding:20px 18px 16px}
.logo-mark{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--orange),#FFA040);
  display:grid;place-items:center;color:#fff;font-weight:800;font-size:17px;letter-spacing:-.5px}
.logo b{color:#fff;font-size:16.5px;letter-spacing:-.2px;display:block;line-height:1.1}
.logo span{font-size:11px;color:#7E8890;letter-spacing:.4px}
.nav{flex:1;padding:6px 10px;overflow-y:auto}
.nav-sec{font-size:10.5px;letter-spacing:1.2px;text-transform:uppercase;color:#67717A;padding:16px 10px 6px}
.nav a{display:flex;align-items:center;gap:11px;padding:8.5px 10px;border-radius:8px;color:#C6CDD3;
  text-decoration:none;font-size:14px;font-weight:500;margin:1px 0;transition:background .15s,color .15s}
.nav a svg{width:17px;height:17px;flex:none;opacity:.75}
.nav a:hover{background:var(--ink-2);color:#fff}
.nav a.on{background:var(--ink-3);color:#fff;box-shadow:inset 3px 0 0 var(--orange)}
.nav a.on svg{opacity:1;color:var(--orange)}
.side-foot{padding:12px 16px;border-top:1px solid #333D45;font-size:11.5px;color:#7E8890}
.side-foot b{color:#AEB7BE}

.main{flex:1;margin-left:var(--sb);display:flex;flex-direction:column;min-width:0}
.topbar{
  position:sticky;top:0;z-index:30;background:rgba(243,244,241,.86);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line);padding:12px 28px;display:flex;align-items:center;gap:14px;
}
.burger{display:none;width:36px;height:36px;border-radius:8px;align-items:center;justify-content:center}
.burger:hover{background:var(--line-2)}
.crumb{font-size:19px;font-weight:750;letter-spacing:-.4px}
.topbar .grow{flex:1}
.camp-pill{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--line);
  border-radius:99px;padding:5px 6px 5px 14px;box-shadow:var(--sh);font-weight:600;font-size:13.5px}
.camp-pill select{border:none;background:var(--ink);color:#fff;border-radius:99px;padding:4px 10px;font-weight:700;outline:none}
.save-dot{font-size:12px;color:var(--tx-3);display:flex;align-items:center;gap:6px}
.save-dot i{width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block}

/* ruban d'assolement — signature */
.strip{height:7px;display:flex;overflow:hidden}
.strip i{height:100%;transition:width .5s ease}

.content{padding:26px 28px 60px;max-width:1340px;width:100%;margin:0 auto;animation:pop .25s ease}
@keyframes pop{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

/* ---------- Composants ---------- */
.page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.page-head h1{font-size:24px;font-weight:800;letter-spacing:-.6px}
.page-head p{color:var(--tx-2);font-size:13.5px;margin-top:4px;max-width:640px}
.actions{display:flex;gap:9px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:7px;border-radius:9px;padding:8px 14px;font-weight:650;font-size:13.5px;
  background:var(--card);border:1px solid var(--line);box-shadow:var(--sh);transition:transform .12s,box-shadow .12s}
.btn:hover{transform:translateY(-1px);box-shadow:var(--sh-2)}
.btn:active{transform:none}
.btn svg{width:15px;height:15px}
.btn.pri{background:var(--orange);border-color:var(--orange);color:#fff}
.btn.pri:hover{background:var(--orange-d)}
.btn.grn{background:var(--green);border-color:var(--green);color:#fff}
.btn.ghost{box-shadow:none;background:transparent}
.btn.danger{color:var(--red)}
.btn.sm{padding:4px 9px;font-size:12.5px;border-radius:7px}

.grid{display:grid;gap:16px}
.g4{grid-template-columns:repeat(4,1fr)} .g3{grid-template-columns:repeat(3,1fr)} .g2{grid-template-columns:repeat(2,1fr)}
@media(max-width:1100px){.g4{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(2,1fr)}}
@media(max-width:640px){.g4,.g3,.g2{grid-template-columns:1fr}}

.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh)}
.card .hd{padding:15px 18px 0;display:flex;align-items:center;justify-content:space-between;gap:10px}
.card .hd h2{font-size:15px;font-weight:750;letter-spacing:-.2px}
.card .hd .sub{font-size:12px;color:var(--tx-3)}
.card .bd{padding:16px 18px 18px}

.kpi{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh);padding:15px 17px;
  position:relative;overflow:hidden}
.kpi::before{content:"";position:absolute;inset:0 auto 0 0;width:4px;background:var(--k,var(--orange))}
.kpi .l{font-size:11px;letter-spacing:.9px;text-transform:uppercase;color:var(--tx-3);font-weight:700}
.kpi .v{font-size:25px;font-weight:800;letter-spacing:-.8px;margin-top:5px;font-variant-numeric:tabular-nums}
.kpi .s{font-size:12px;color:var(--tx-2);margin-top:3px}

table.tb{width:100%;border-collapse:collapse;font-size:13.5px}
.tb th{font-size:11px;text-transform:uppercase;letter-spacing:.7px;color:var(--tx-3);font-weight:700;
  text-align:left;padding:9px 10px;border-bottom:1px solid var(--line);background:#FAFBF9;white-space:nowrap}
.tb td{padding:8px 10px;border-bottom:1px solid var(--line-2);vertical-align:middle;font-variant-numeric:tabular-nums}
.tb tr:hover td{background:#FAFAF7}
.tb .num{text-align:right}
.tb th.num{text-align:right}
.tb .tot td{font-weight:750;background:#F5F6F2;border-top:2px solid var(--line)}
.tb-wrap{overflow-x:auto;border-radius:0 0 var(--r) var(--r)}
.tb input,.tb select{border:1px solid transparent;background:transparent;border-radius:6px;padding:4px 6px;width:100%;
  min-width:52px;outline:none;transition:border .15s,background .15s;font-variant-numeric:tabular-nums}
.tb input:hover,.tb select:hover{border-color:var(--line)}
.tb input:focus,.tb select:focus{border-color:var(--orange);background:#FFF;box-shadow:0 0 0 3px rgba(245,124,0,.12)}
.tb input.num{text-align:right}
.tb input.ed,.tb select.ed{color:var(--blue);font-weight:600}
.calc{color:var(--tx);font-weight:600}
.muted{color:var(--tx-3)}

.chip{display:inline-flex;align-items:center;gap:6px;border-radius:99px;padding:2.5px 10px;font-size:12px;font-weight:700}
.chip i{width:8px;height:8px;border-radius:50%;background:currentColor}
.sig-g{background:var(--green-bg);color:var(--green)} .sig-a{background:var(--amber-bg);color:#9A7100}
.sig-r{background:var(--red-bg);color:var(--red)} .sig-n{background:var(--line-2);color:var(--tx-2)}
.tag{display:inline-block;border-radius:6px;padding:2px 8px;font-size:11.5px;font-weight:700;background:var(--line-2);color:var(--tx-2)}

.field{display:flex;flex-direction:column;gap:5px;margin-bottom:13px}
.field label{font-size:12px;font-weight:700;color:var(--tx-2)}
.field input,.field select,.field textarea{border:1px solid var(--line);border-radius:8px;padding:8px 11px;background:#fff;outline:none}
.field input:focus,.field select:focus{border-color:var(--orange);box-shadow:0 0 0 3px rgba(245,124,0,.12)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:560px){.frow{grid-template-columns:1fr}}

/* modal */
.overlay{position:fixed;inset:0;background:rgba(24,30,36,.45);z-index:80;display:grid;place-items:center;padding:20px;
  animation:fade .18s ease}
@keyframes fade{from{opacity:0}to{opacity:1}}
.modal{background:#fff;border-radius:16px;box-shadow:var(--sh-2);width:min(560px,100%);max-height:90vh;overflow:auto;
  animation:pop .22s ease}
.modal .m-hd{padding:18px 20px 4px;display:flex;justify-content:space-between;align-items:center}
.modal .m-hd h3{font-size:17px;font-weight:800;letter-spacing:-.3px}
.modal .m-bd{padding:14px 20px 4px}
.modal .m-ft{padding:12px 20px 18px;display:flex;justify-content:flex-end;gap:9px}
.x{width:32px;height:32px;border-radius:8px;display:grid;place-items:center;color:var(--tx-3)}
.x:hover{background:var(--line-2);color:var(--tx)}

.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;
  padding:10px 18px;border-radius:99px;font-size:13.5px;font-weight:600;z-index:99;box-shadow:var(--sh-2);
  animation:toast 2.6s ease forwards}
@keyframes toast{0%{opacity:0;transform:translate(-50%,10px)}10%,85%{opacity:1;transform:translate(-50%,0)}100%{opacity:0}}

.empty{padding:40px;text-align:center;color:var(--tx-3)}
.empty b{display:block;color:var(--tx-2);font-size:15px;margin-bottom:5px}
.legend{display:flex;flex-wrap:wrap;gap:12px;font-size:12.5px;color:var(--tx-2)}
.legend span{display:inline-flex;align-items:center;gap:6px}
.legend i{width:10px;height:10px;border-radius:3px}
.bar-row{display:grid;grid-template-columns:130px 1fr 92px;align-items:center;gap:10px;margin:7px 0;font-size:13px}
.bar-row .tr{height:9px;border-radius:99px;background:var(--line-2);overflow:hidden}
.bar-row .tr i{display:block;height:100%;border-radius:99px;transition:width .5s ease}
.bar-row .vv{text-align:right;font-weight:700;font-variant-numeric:tabular-nums}
.hint{font-size:12.5px;color:var(--tx-3);margin-top:9px}
.hint b{color:var(--tx-2)}
.seg{display:inline-flex;background:var(--line-2);border-radius:9px;padding:3px;gap:2px}
.seg button{padding:5px 13px;border-radius:7px;font-size:13px;font-weight:650;color:var(--tx-2)}
.seg button.on{background:#fff;color:var(--tx);box-shadow:var(--sh)}
.check{width:16px;height:16px;accent-color:var(--orange)}

/* ---------- Assistant vocal Hectaris ---------- */
.ai-brief{position:relative;overflow:hidden;margin-bottom:20px;border:1px solid #3B444B;border-radius:18px;
  background:linear-gradient(135deg,#20272C 0%,#2B343B 62%,#354047 100%);color:#fff;box-shadow:0 12px 32px rgba(24,30,36,.18)}
.ai-brief::after{content:"";position:absolute;width:280px;height:280px;border-radius:50%;right:-110px;top:-150px;
  background:radial-gradient(circle,rgba(245,124,0,.30),rgba(245,124,0,0) 70%);pointer-events:none}
.ai-inner{position:relative;z-index:1;display:grid;grid-template-columns:64px 1fr auto;gap:18px;align-items:center;padding:20px 22px}
.ai-orb{width:58px;height:58px;border-radius:50%;display:grid;place-items:center;background:rgba(245,124,0,.13);
  border:1px solid rgba(255,160,64,.42);box-shadow:inset 0 0 22px rgba(245,124,0,.12),0 0 0 7px rgba(255,255,255,.035)}
.ai-orb svg{width:27px;height:27px;color:#FFA040}
.ai-copy .eyebrow{font-size:10.5px;letter-spacing:1.5px;text-transform:uppercase;color:#FFA040;font-weight:800;margin-bottom:4px}
.ai-copy h2{font-size:20px;letter-spacing:-.35px;margin-bottom:4px}.ai-copy p{color:#BBC3C8;font-size:13px;line-height:1.45}
.ai-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end}
.ai-play{display:inline-flex;align-items:center;gap:9px;border-radius:99px;padding:11px 18px;background:var(--orange);color:#fff;
  font-weight:750;box-shadow:0 7px 18px rgba(245,124,0,.28);transition:transform .15s,background .15s}
.ai-play:hover{background:#FF8B14;transform:translateY(-1px)}.ai-play svg{width:16px;height:16px;fill:currentColor}
.ai-mini{width:40px;height:40px;border-radius:50%;display:grid;place-items:center;border:1px solid #525D65;color:#D6DCE0;background:rgba(255,255,255,.04)}
.ai-mini:hover{background:rgba(255,255,255,.1);color:#fff}.ai-mini svg{width:15px;height:15px;fill:currentColor}
.ai-mini:disabled{opacity:.35;cursor:default;background:transparent}
.ai-progress{height:3px;background:rgba(255,255,255,.09)}.ai-progress i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--orange),#FFB45D);transition:width .2s linear}
.ai-status{display:flex;align-items:center;gap:7px;margin-top:7px;font-size:11.5px;color:#929DA4}
.ai-status b{color:#E5E9EB;font-weight:650}.ai-live{display:none;gap:3px;height:12px;align-items:center}.ai-live i{width:3px;border-radius:5px;background:#FFA040;animation:aiwave .8s ease-in-out infinite}
.ai-live i:nth-child(1){height:5px}.ai-live i:nth-child(2){height:11px;animation-delay:.12s}.ai-live i:nth-child(3){height:7px;animation-delay:.24s}.ai-live i:nth-child(4){height:10px;animation-delay:.36s}
.ai-brief.playing .ai-live{display:flex}@keyframes aiwave{50%{height:3px;opacity:.55}}
@media(max-width:760px){.ai-inner{grid-template-columns:52px 1fr;padding:17px 16px;gap:13px}.ai-orb{width:48px;height:48px}.ai-actions{grid-column:1/-1;justify-content:flex-start}.ai-play{flex:1;justify-content:center}}

/* ---------- Interventions : programmes, statuts, planning ---------- */
.stchip{display:inline-flex;align-items:center;gap:5px;border-radius:99px;padding:2px 9px;font-size:11.5px;font-weight:700}
.st-Prévue{background:var(--line-2);color:var(--tx-2)} .st-Àconfirmer{background:var(--amber-bg);color:#9A7100}
.st-Commandée{background:#E3EEF6;color:var(--blue)} .st-Àréaliser{background:var(--orange-bg);color:var(--orange-d)}
.st-Encours{background:#E3EEF6;color:var(--blue)} .st-Réalisée{background:var(--green-bg);color:var(--green)}
.st-Annulée{background:var(--red-bg);color:var(--red);text-decoration:line-through}
.period-h{display:flex;align-items:center;gap:10px;margin:22px 0 10px;font-size:16px;font-weight:800;letter-spacing:-.3px}
.period-h .tag{font-weight:700}
.pgcard{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh);margin-bottom:12px;overflow:hidden}
.pgcard .p-hd{padding:12px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;border-bottom:1px solid var(--line-2)}
.pgcard .p-hd b{font-size:14.5px}
.pgcard .p-meta{font-size:12.5px;color:var(--tx-2)}
.pgcard .p-act{margin-left:auto;display:flex;gap:6px;flex-wrap:wrap}
.pgcard .p-real{background:var(--green-bg);padding:9px 16px;font-size:12.5px;border-top:1px solid var(--line-2)}
.filters{display:flex;gap:8px;flex-wrap:wrap;align-items:center;background:var(--card);border:1px solid var(--line);
  border-radius:var(--r);box-shadow:var(--sh);padding:10px 12px;margin-bottom:14px}
.filters select{border:1px solid var(--line);border-radius:8px;padding:6px 9px;background:#fff;font-size:13px;max-width:170px}
.filters .lbl{font-size:11px;text-transform:uppercase;letter-spacing:.7px;color:var(--tx-3);font-weight:700}
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.cal .dayh{font-size:11px;text-transform:uppercase;color:var(--tx-3);font-weight:700;text-align:center;padding:4px 0}
.cal .day{min-height:82px;background:var(--card);border:1px solid var(--line);border-radius:9px;padding:5px 6px;font-size:12px}
.cal .day.off{opacity:.4}
.cal .dnum{font-weight:700;color:var(--tx-3);font-size:11px}
.cal .ev{background:var(--orange-bg);border-left:3px solid var(--orange);border-radius:5px;padding:2px 5px;margin-top:3px;
  font-size:11px;font-weight:600;cursor:pointer;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.alertbox{background:var(--amber-bg);border:1px solid #EAD489;border-radius:var(--r);padding:11px 15px;font-size:13px;margin-bottom:14px}
.alertbox b{display:block;margin-bottom:4px}
.alertbox ul{margin-left:18px}
.miss{color:var(--red);font-weight:700;font-size:12px}
.lines-ed .row{display:grid;grid-template-columns:1.4fr 1fr 78px 1fr 30px;gap:8px;margin-bottom:7px;align-items:center}
.pk-list{max-height:180px;overflow:auto;border:1px solid var(--line);border-radius:9px;padding:8px 10px;
  display:grid;grid-template-columns:1fr 1fr;gap:3px 12px;font-size:13px}
.pk-list label{display:flex;gap:7px;align-items:center;cursor:pointer}
@media(max-width:920px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:none;box-shadow:var(--sh-2)}
  .main{margin-left:0}
  .burger{display:inline-flex}
  .content{padding:18px 14px 60px}
  .crumb{font-size:16px}
}
body::after{content:none}
@media print{
  body::after{content:"© 2026 Renaud Vigneaux — EARL Vigneaux · Hectaris — Tous droits réservés · Reproduction interdite sans autorisation";
    display:block;position:fixed;bottom:6px;left:0;right:0;text-align:center;font-size:9px;color:#8B949C}
  .sidebar,.topbar,.actions,.no-print{display:none!important}
  .main{margin:0} .content{max-width:none;padding:0}
  .card{box-shadow:none;break-inside:avoid;margin-bottom:14px}
  body{background:#fff}
}
</style>
</head>
<body>
<div id="app">
  <aside class="sidebar" id="sidebar">
    <div class="logo">
      <div class="logo-mark">H</div>
      <div><b>Hectaris</b><span>ASSOLEMENT & PRÉVISION</span></div>
    </div>
    <nav class="nav" id="nav"></nav>
    <div class="side-foot">Campagne <b id="foot-camp"></b><br><span id="foot-surf"></span><br><span style="font-size:10px;opacity:.75">© 2026 Renaud Vigneaux — Tous droits réservés<br>Données stockées localement dans votre navigateur.<br>Hectaris ne transmet aucune donnée à GitHub.</span></div>
  </aside>
  <div class="main">
    <div class="topbar">
      <button class="burger" onclick="UI.toggleSidebar()" aria-label="Menu">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M4 7h16M4 12h16M4 17h16"/></svg>
      </button>
      <div class="crumb" id="crumb">Tableau de bord</div>
      <div class="grow"></div>
      <div class="save-dot no-print"><i></i><span id="save-txt">Enregistré</span></div>
      <div class="camp-pill no-print">
        Campagne <select id="camp-sel" onchange="Store.switchCampaign(this.value)"></select>
        <button class="btn sm ghost" title="Nouvelle campagne" onclick="UI.newCampaign()">＋</button>
      </div>
    </div>
    <div class="strip" id="strip"></div>
    <div class="content" id="view"></div>
  </div>
</div>
<div id="modal-root"></div>
<script>
"use strict";
const LEGAL = {

/* ---- MIGRATION : anciennes sauvegardes → modèle v2, sans perte ---- */
function migrateCampaign(c) {
  if (!c.periods) c.periods = DEFAULT_PERIODS.map(n=>({ id:uid(), name:n, archived:false }));
  if (!c.programs) c.programs = [];
  (c.products||[]).forEach(p=>{ if(p.stock==null) p.stock=0; if(p.ordered==null) p.ordered=0; });
  // Engrais v1 → v2
  (c.fertilizers||[]).forEach(f=>{
    if (f.appUnit) return;
    f.cat = (f.id==="sol39"||f.id==="n33") ? "azote" : "fond";
    f.appUnit = f.id==="cp" ? "t/ha" : f.id==="sol39" ? "l/ha" : "kg/ha";
    f.priceUnit = "t";
    f.price = f.ref!=null ? f.ref : 0;                    // ancien prix de référence €/t
    if (f.id==="sol39") { f.density = c.params?.density ?? 1.33; f.tenor = c.params?.tenor39 ?? 0.39; }
    if (f.id==="n33")   { f.tenor = c.params?.tenor33 ?? 0.335; }
    f.supplier = f.supplier ?? ""; f.composition=""; f.active = true;
    f.priceUpdated = f.priceUpdated ?? today();
    f.history = f.history ?? [{ id:uid(), date:f.priceUpdated, supplier:f.supplier, price:f.price, unit:"t", qty:"", comment:"Migration", retained:true }];
  });
  // Interventions v1 → programmes (regroupées par période + culture + parcelle)
  if (c.interventions && c.interventions.length) {
    const groups = {};
    c.interventions.forEach(iv=>{
      const period = iv.period || "Période non renseignée";
      if (!c.periods.some(p=>p.name===period)) c.periods.push({ id:uid(), name:period, archived:false });
      const key = period+"|"+(iv.cult||"")+"|"+(iv.parcel||"");
      const g = groups[key] || (groups[key] = { id:uid(), period, status:"Prévue", type:iv.type,
        cult:iv.cult||"", vari:"", parcels: iv.parcel?[iv.parcel]:null, datePlan:"", objective:"",
        trigger:"", note:"", real:null, lines:[] });
      g.lines.push({ id:uid(), prod:iv.prod, dose:iv.dose, type:iv.type, note:iv.comment||"" });
    });
    c.programs.push(...Object.values(groups));
    delete c.interventions;
  }
  // périodes utilisées mais absentes du référentiel
  c.programs.forEach(pg=>{
    if (pg.period && !c.periods.some(p=>p.name===pg.period))
      c.periods.push({ id:uid(), name:pg.period, archived:false });
    pg.lines.forEach(l=>{ if(l.type==null) l.type=pg.type||"Autre"; });
  });
  // Engrais azote indispensables aux calculs : les créer s'ils manquent
  const ensureFert=(id,name,appUnit,tenor,density)=>{
    if(!c.fertilizers.some(f=>f.id===id))
      c.fertilizers.push({ id, name, cat:"azote", appUnit, priceUnit:"t", price:null, density:density??null,
        tenor, supplier:"", composition:"", comment:"", active:true, priceUpdated:"", history:[],
        cur:null, tgt:null, low:null, high:null, stock:0, decision:"Surveiller", pct:0 });
  };
  ensureFert("sol39","Solution azotée 39","l/ha", c.params?.tenor39 ?? 0.39, c.params?.density ?? 1.30);
  ensureFert("n33","Azote solide 33,5","kg/ha", c.params?.tenor33 ?? 0.335);
  if (!c.seedOrders) c.seedOrders = {};
  if (!c.storageNames) c.storageNames = { bran:"Cuve 1", fouch:"Cuve 2" };
  (c.parcels||[]).forEach(p=>{ if(p.prev==null) p.prev=""; });
  return c;
}

const Store = {
  data:null,
  firstRun:false,
  load() {
    try {
      const raw = Storage.get(DB_KEY);
      if (raw) { this.data = JSON.parse(raw);
        Object.values(this.data.campaigns).forEach(migrateCampaign); this.persist(); return; }
    } catch(e){ console.warn("Lecture locale impossible :", e); }
    // Aucune sauvegarde locale : base vierge en mémoire, assistant affiché, RIEN n'est écrit
    // tant que l'utilisateur n'a pas choisi (les données existantes ne sont jamais remplacées).
    const y = String(new Date().getFullYear());
    this.data = { version:2, active:y, campaigns:{ [y]: defaultCampaign() } };
    this.firstRun = true;
  },
  persist() {
    try {
      Storage.set(DB_KEY, JSON.stringify(this.data));
      const el=document.getElementById("save-txt");
      if (el) el.textContent = Storage.ok
        ? "Enregistré "+new Date().toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"})
        : "⚠ Non sauvegardé (mode aperçu)";
    } catch(e){ UI.toast("⚠ Sauvegarde locale impossible"); }
  },
  get camp(){ return this.data.campaigns[this.data.active]; },

  switchCampaign(n){ this.data.active=n; this.persist(); UI.renderShell(); UI.render(); },
  createCampaign(n, mode){
    if(this.data.campaigns[n]){ UI.toast("Cette campagne existe déjà"); return; }
    const src=this.camp, copy=JSON.parse(JSON.stringify(src));
    if(mode!=="full"){
      // Rotation : cultures actuelles → précédents culturaux ; interventions & achats non copiés
      copy.parcels.forEach(p=>{ const cu=copy.cultures.find(x=>x.id===p.cult);
        p.prev = cu ? cu.name : (p.prev||""); p.cult=""; p.vari=""; p.nOv={}; p.fOv={}; });
      copy.programs=[]; copy.purchases=[]; copy.seedOrders={}; delete copy.demo;
    }
    this.data.campaigns[n]=copy;
    this.data.active=n; this.persist(); UI.renderShell(); UI.render();
    UI.toast("Campagne "+n+" créée"+(mode!=="full"?" — cultures transférées en précédents":" (copie complète)"));
  },
  deleteCampaign(n){
    if(Object.keys(this.data.campaigns).length<=1){ UI.toast("Impossible : dernière campagne"); return; }
    delete this.data.campaigns[n];
    if(this.data.active===n) this.data.active=Object.keys(this.data.campaigns)[0];
    this.persist(); UI.renderShell(); UI.render();
  },
};
/* =====================================================================
   MODULE 2 — FERT : moteur de conversion générique des engrais
   Choisit automatiquement la formule selon unité d'application × unité commerciale.
   Retourne toujours { ok, cost|null, reason } — jamais un faux « 0 € ».
   ===================================================================== */
const FERT = {
  needsDensity(f){ return f.appUnit==="l/ha" && (f.priceUnit==="t" || f.priceUnit==="kg"); },
  /** quantité totale (en unité d'application) → tonnes ; null si non convertible */
  toTons(f, qty) {
    if (!f || qty==null) return null;
    if (f.appUnit==="kg/ha") return qty/1000;
    if (f.appUnit==="t/ha")  return qty;
    if (f.appUnit==="l/ha")  return f.density>0 ? qty*f.density/1000 : null;
    return null;   // u/ha, dose/ha : pas d'équivalent tonnes
  },
  /** prix converti vers l'unité d'application (ex. €/t → €/L) ; {ok, val, label, reason} */
  unitPrice(f) {
    if(!f) return { ok:false, reason:"Engrais introuvable" };
    const px=+f.price;
    if (!(px>0)) return { ok:false, reason:"Prix à renseigner" };
    if (px<0)    return { ok:false, reason:"Prix négatif" };
    const u=f.appUnit, pu=f.priceUnit;
    if (pu==="forfait") return { ok:true, val:null, label:"forfait "+fmt(px)+" €", flat:px };
    if (pu==="t") {
      if (u==="kg/ha") return { ok:true, val:px/1000, label:fmt(px/1000,3)+" €/kg" };
      if (u==="t/ha")  return { ok:true, val:px, label:fmt(px,2)+" €/t" };
      if (u==="l/ha")  return f.density>0
        ? { ok:true, val:px*f.density/1000, label:fmt(px*f.density/1000,3)+" €/L" }
        : { ok:false, reason:"Densité requise" };
      return { ok:false, reason:"Unités incompatibles ("+PRICE_UNITS[pu]+" ↔ "+u+")" };
    }
    if (pu==="kg") {
      if (u==="kg/ha") return { ok:true, val:px, label:fmt(px,3)+" €/kg" };
      if (u==="t/ha")  return { ok:true, val:px*1000, label:fmt(px*1000)+" €/t" };
      if (u==="l/ha")  return f.density>0
        ? { ok:true, val:px*f.density, label:fmt(px*f.density,3)+" €/L" }
        : { ok:false, reason:"Densité requise" };
      return { ok:false, reason:"Unités incompatibles" };
    }
    if (pu==="L")    return u==="l/ha"    ? { ok:true, val:px, label:fmt(px,3)+" €/L" }    : { ok:false, reason:"Unités incompatibles" };
    if (pu==="dose") return u==="dose/ha" ? { ok:true, val:px, label:fmt(px,2)+" €/dose" } : { ok:false, reason:"Unités incompatibles" };
    if (pu==="u")    return u==="u/ha"    ? { ok:true, val:px, label:fmt(px,2)+" €/u" }    : { ok:false, reason:"Unités incompatibles" };
    return { ok:false, reason:"Unité commerciale inconnue" };
  },
  /** coût d'une quantité totale exprimée dans l'unité d'application */
  cost(f, qty) {
    const up=this.unitPrice(f);
    if (!up.ok) return { ok:false, cost:null, reason:up.reason };
    if (up.flat!=null) return { ok:true, cost: qty>0 ? up.flat : 0 };
    return { ok:true, cost: Math.round(qty*up.val*100)/100 };
  },
  /** coût pour un prix €/t donné (scénarios du prévisionnel) — engrais tarifés à la tonne */
  costAtTon(f, qty, pricePerTon) {
    const t=this.toTons(f, qty);
    return t==null ? null : Math.round(t*pricePerTon);
  },
  histStats(f) {
    const h=(f.history||[]).filter(x=>+x.price>0).sort((a,b)=>(a.date||"").localeCompare(b.date||""));
    if (!h.length) return null;
    const prices=h.map(x=>+x.price);
    const last=h[h.length-1], prev=h.length>1?h[h.length-2]:null;
    return { last:+last.price, lastDate:last.date, best:Math.min(...prices),
      avg:Math.round(prices.reduce((s,p)=>s+p,0)/prices.length*10)/10,
      delta: prev? +last.price-+prev.price : null, count:h.length };
  },
};

/* =====================================================================
   MODULE 3 — CALC : moteur de calcul métier
   ===================================================================== */
const fmt  = (n,d=0) => (n==null||isNaN(n)) ? "—" : n.toLocaleString("fr-FR",{minimumFractionDigits:d,maximumFractionDigits:d});
const eur  = (n,d=0) => (n==null||isNaN(n)) ? "—" : fmt(n,d)+" €";
const eurHa= n => (n==null||isNaN(n)) ? "—" : fmt(n)+" €/ha";
const MISS = '<span class="miss">Prix à renseigner</span>';
const CALC = {
  cult(c,id){ return c.cultures.find(x=>x.id===id); },
  vari(c,id){ return c.varieties.find(x=>x.id===id); },
  prod(c,id){ return c.products.find(x=>x.id===id); },
  fert(c,id){ return c.fertilizers.find(x=>x.id===id); },
  fondFerts(c){ return c.fertilizers.filter(f=>f.cat==="fond" && f.active!==false); },
  active(c){ return c.parcels.filter(p=>!p.archived); },
  surfTot(c){ return this.active(c).reduce((s,p)=>s+(+p.area||0),0); },
  surfByCult(c){ const m={}; this.active(c).forEach(p=>{ m[p.cult]=(m[p.cult]||0)+(+p.area||0); }); return m; },

  /* ---- SEMENCES (inchangé) ---- */
  seedRow(c,p) {
    const v=this.vari(c,p.vari); if(!v) return null;
    const r={ parcel:p, v };
    if (v.pmg && v.grains) {
      r.kgHa=Math.round(v.pmg*v.grains/c.params.pmgDiv); r.kg=Math.round(r.kgHa*p.area);
      r.price=v.prixKg||0; r.costHa=r.kgHa*r.price; r.cost=Math.round(r.kg*r.price);
    } else if (v.dose) {
      r.doseHa=v.dose; r.doses=Math.round(v.dose*p.area*10)/10;
      r.price=v.prixDose||0; r.costHa=v.dose*r.price; r.cost=Math.round(r.doses*r.price);
    }
    return r;
  },
  seeds(c) {
    const rows=this.active(c).map(p=>this.seedRow(c,p)).filter(Boolean);
    const byVar={};
    rows.forEach(r=>{ const b=byVar[r.v.id]||(byVar[r.v.id]={v:r.v,kg:0,doses:0,cost:0});
      b.kg+=r.kg||0; b.doses+=r.doses||0; b.cost+=r.cost||0; });
    Object.values(byVar).forEach(b=>{ const so=c.seedOrders[b.v.id]||{};
      b.stock=so.stock||0; b.ordered=so.ordered||0; b.need=b.kg||b.doses;
      b.left=Math.max(0,Math.round((b.need-b.stock-b.ordered)*10)/10); });
    return { rows, byVar, totKg:rows.reduce((s,r)=>s+(r.kg||0),0),
      totDoses:Math.round(rows.reduce((s,r)=>s+(r.doses||0),0)*10)/10,
      totCost:rows.reduce((s,r)=>s+(r.cost||0),0) };
  },

  /* ---- AZOTE : teneurs & densité portées par l'engrais ---- */
  nRow(c,p) {
    const cu=this.cult(c,p.cult); if(!cu) return null;
    const f39=this.fert(c,"sol39"), f33=this.fert(c,"n33");
    const T39=f39?.tenor||c.params.tenor39, T33=f33?.tenor||c.params.tenor33;
    const ov=p.nOv||{};
    const r={ parcel:p, cu, apports:[], sol39:0, n33:0 };
    [["a1","sol39"],["a2","sol39"],["a3",cu.n.f3],["a4",cu.n.f4]].forEach(([k,defForm],i)=>{
      const uN = ov[k]!=null&&ov[k]!==""?+ov[k]:(cu.n[k]||0);
      const form = (i>=2 && ov["f"+(i+1)])?ov["f"+(i+1)]:defForm;
      if(!uN){ r.apports.push(null); return; }
      const perHa = form==="n33"?uN/T33:uN/T39;
      const tot=Math.round(perHa*p.area);
      r.apports.push({ uN, form, perHa:Math.round(perHa), tot });
      if(form==="n33") r.n33+=tot; else r.sol39+=tot;
    });
    const c39=FERT.cost(f39,r.sol39), c33=FERT.cost(f33,r.n33);
    r.priced = c39.ok && c33.ok;
    r.cost = Math.round((c39.cost||0)+(c33.cost||0));
    r.costHa = p.area? r.cost/p.area : 0;
    return r;
  },
  nitrogen(c) {
    const rows=this.active(c).map(p=>this.nRow(c,p)).filter(Boolean);
    const byCult={}, byPlace={ bran:{sol39:0,n33:0}, fouch:{sol39:0,n33:0} };
    rows.forEach(r=>{
      const b=byCult[r.cu.id]||(byCult[r.cu.id]={sol39:0,n33:0,cost:0,area:0});
      b.sol39+=r.sol39; b.n33+=r.n33; b.cost+=r.cost; b.area+=+r.parcel.area||0;
      const pl=byPlace[r.parcel.storage]; if(pl){ pl.sol39+=r.sol39; pl.n33+=r.n33; }
    });
    return { rows, byCult, byPlace,
      sol39:rows.reduce((s,r)=>s+r.sol39,0), n33:rows.reduce((s,r)=>s+r.n33,0),
      cost:rows.reduce((s,r)=>s+r.cost,0), priced:rows.every(r=>r.priced) };
  },

  /* ---- ENGRAIS DE FOND : dynamique, tous engrais cat "fond" ---- */
  fondRow(c,p) {
    const cu=this.cult(c,p.cult); if(!cu) return null;
    const ov=p.fOv||{};
    const items = this.fondFerts(c).map(f=>{
      const dose = ov[f.id]!=null&&ov[f.id]!==""?+ov[f.id]:(cu.fond?.[f.id]||0);
      const qty = f.appUnit==="t/ha" ? Math.round(dose*p.area*10)/10 : Math.round(dose*p.area*100)/100;
      const cc = dose>0 ? FERT.cost(f,qty) : { ok:true, cost:0 };
      return { f, dose, qty, tons:FERT.toTons(f,qty), cost:cc.ok?Math.round(cc.cost):null, ok:cc.ok, reason:cc.reason };
    });
    const priced = items.every(i=>i.ok);
    const cost = items.reduce((s,i)=>s+(i.cost||0),0);
    return { parcel:p, cu, items, cost, priced, costHa: p.area?cost/p.area:0, hasOv:Object.keys(ov).length>0 };
  },
  fond(c) {
    const rows=this.active(c).map(p=>this.fondRow(c,p)).filter(Boolean);
    const byFert={}, byCult={};
    this.fondFerts(c).forEach(f=>byFert[f.id]={ f, qty:0, tons:0, cost:0, ok:true });
    rows.forEach(r=>{
      const bc=byCult[r.cu.id]||(byCult[r.cu.id]={cost:0,perFert:{}});
      bc.cost+=r.cost;
      r.items.forEach(i=>{
        const bf=byFert[i.f.id]; if(!bf) return;
        bf.qty+=i.qty; if(i.tons!=null) bf.tons+=i.tons; bf.cost+=(i.cost||0); if(!i.ok) bf.ok=false;
        bc.perFert[i.f.id]=(bc.perFert[i.f.id]||0)+i.qty;
      });
    });
    Object.values(byFert).forEach(b=>{ b.qty=Math.round(b.qty*10)/10; b.tons=Math.round(b.tons*100)/100; });
    return { rows, byFert, byCult, cost:rows.reduce((s,r)=>s+r.cost,0), priced:rows.every(r=>r.priced) };
  },

  /* ---- PROGRAMMES D'INTERVENTIONS ---- */
  progParcels(c,pg) {
    let ps=this.active(c);
    if (pg.parcels && pg.parcels.length) return ps.filter(p=>pg.parcels.includes(p.id));
    return ps.filter(p=>(!pg.cult||p.cult===pg.cult)&&(!pg.vari||p.vari===pg.vari));
  },
  progView(c,pg) {
    const parcels=this.progParcels(c,pg);
    const area=Math.round(parcels.reduce((s,p)=>s+(+p.area||0),0)*100)/100;
    const lines=pg.lines.map(l=>{
      const prod=this.prod(c,l.prod);
      const qty=l.dose!=null&&area?Math.round(l.dose*area*100)/100:null;
      const priced=prod&&+prod.price>0;
      const cost=qty!=null&&priced?Math.round(qty*prod.price):null;
      return { l, prod, qty, cost, priced, costHa: cost!=null&&area?cost/area:null };
    });
    const cost=lines.reduce((s,x)=>s+(x.cost||0),0);
    const priced=lines.every(x=>x.priced||x.l.dose==null);
    // écarts si réalisé
    let realCost=null, gap=null;
    if (pg.real) {
      realCost=(pg.real.lines||[]).reduce((s,rl)=>{
        const prod=this.prod(c,rl.prod); const a=pg.real.area??area;
        return s+Math.round((rl.dose||0)*a*(prod?.price||0));
      },0);
      gap=realCost-cost;
    }
    return { pg, parcels, area, lines, cost, priced, costHa:area?cost/area:0, realCost, gap };
  },
  programs(c, filt={}) {
    return c.programs
      .map(pg=>this.progView(c,pg))
      .filter(v=>{
        const pg=v.pg;
        if (filt.period && pg.period!==filt.period) return false;
        if (filt.status && pg.status!==filt.status) return false;
        if (filt.cult && pg.cult!==filt.cult) return false;
        if (filt.vari && pg.vari!==filt.vari) return false;
        if (filt.type && !pg.lines.some(l=>l.type===filt.type)) return false;
        if (filt.prod && !pg.lines.some(l=>l.prod===filt.prod)) return false;
        if (filt.parcel && !v.parcels.some(p=>p.id===filt.parcel)) return false;
        return true;
      });
  },
  periodOrder(c){ const o={}; c.periods.forEach((p,i)=>o[p.name]=i); return o; },
  /* coûts phyto prévisionnels (hors annulées) et réalisés — pour dashboard & marges */
  phyto(c) {
    const views=this.programs(c).filter(v=>v.pg.status!=="Annulée");
    const byType={}, byCult={};
    views.forEach(v=>{
      if(v.pg.cult) byCult[v.pg.cult]=(byCult[v.pg.cult]||0)+v.cost;
      v.lines.forEach(x=>{ byType[x.l.type]=(byType[x.l.type]||0)+(x.cost||0); });
    });
    const done=views.filter(v=>v.pg.status==="Réalisée");
    return { views, byType, byCult,
      cost:views.reduce((s,v)=>s+v.cost,0),
      realCost:done.reduce((s,v)=>s+(v.realCost??v.cost),0),
      counts:{ total:views.length,
        todo:views.filter(v=>["Prévue","À confirmer","Commandée","À réaliser","En cours"].includes(v.pg.status)).length,
        done:done.length },
      areaTodo:Math.round(views.filter(v=>!["Réalisée","Annulée"].includes(v.pg.status)).reduce((s,v)=>s+v.area,0)*10)/10 };
  },
  /** synthèse produits (besoin/stock/commandé/reste) sur un ensemble filtré */
  productNeeds(c, views) {
    const m={};
    views.filter(v=>!["Réalisée","Annulée"].includes(v.pg.status)).forEach(v=>v.lines.forEach(x=>{
      if(!x.prod||x.qty==null) return;
      const b=m[x.prod.id]||(m[x.prod.id]={ prod:x.prod, qty:0 });
      b.qty+=x.qty;
    }));
    return Object.values(m).map(b=>{
      b.qty=Math.round(b.qty*100)/100;
      b.stock=+b.prod.stock||0; b.ordered=+b.prod.ordered||0;
      b.left=Math.max(0,Math.round((b.qty-b.stock-b.ordered)*100)/100);
      return b;
    }).sort((a,b)=>b.left-a.left);
  },
  progAlerts(c) {
    const out=[];
    const views=this.programs(c);
    views.forEach(v=>{ const pg=v.pg, name=(pg.period||"?")+" · "+(this.cult(c,pg.cult)?.name||"?");
      if(!pg.period) out.push("Programme sans période : "+name);
      if(!pg.lines.length) out.push("Aucun produit dans le programme "+name);
      if(!v.parcels.length && pg.status!=="Annulée") out.push("Aucune parcelle ne correspond : "+name);
      if(pg.lines.some(l=>l.dose==null||l.dose==="")) out.push("Dose manquante : "+name);
      if(v.lines.some(x=>!x.priced)) out.push("Prix produit manquant : "+name);
      if(pg.status==="Réalisée" && !(pg.real&&pg.real.date)) out.push("Réalisée sans date réelle : "+name);
    });
    this.productNeeds(c,views).forEach(b=>{
      if(b.qty>0 && b.stock>0 && b.qty>b.stock+b.ordered)
        out.push("Stock insuffisant : "+b.prod.name+" (besoin "+fmt(b.qty,1)+" "+b.prod.unit+", dispo "+fmt(b.stock+b.ordered,1)+")");
    });
    const seen={};
    views.forEach(v=>v.lines.forEach(x=>{ if(!x.prod)return;
      const k=v.pg.period+"|"+v.pg.cult+"|"+x.prod.id;
      if(seen[k]&&seen[k]!==v.pg.id) out.push("Doublon possible : "+x.prod.name+" deux fois en "+v.pg.period+" ("+(this.cult(c,v.pg.cult)?.name||"")+")");
      seen[k]=v.pg.id; }));
    return [...new Set(out)];
  },

  /* ---- PRÉVISIONNEL ENGRAIS ---- */
  fertNeeds(c) {
    const nit=this.nitrogen(c), fd=this.fond(c);
    const m={ sol39:nit.sol39, n33:nit.n33 };
    Object.values(fd.byFert).forEach(b=>m[b.f.id]=b.qty);
    return m;
  },
  fertView(c) {
    const needs=this.fertNeeds(c);
    return c.fertilizers.filter(f=>f.active!==false).map(f=>{
      const need=needs[f.id]||0;
      const tons=FERT.toTons(f,need);
      const buys=c.purchases.filter(b=>b.fert===f.id);
      const secured=Math.round(buys.reduce((s,b)=>s+(+b.qty||0),0)*10)/10;
      const spent=buys.reduce((s,b)=>s+(+b.qty||0)*(+b.price||0),0);
      const pmp=secured?Math.round(spent/secured*10)/10:0;
      const left=tons!=null?Math.max(0,Math.round((tons-(+f.stock||0)-secured)*10)/10):null;
      const cover=tons?((+f.stock||0)+secured)/tons:null;
      const up=FERT.unitPrice(f);
      const needCost=FERT.cost(f,need);
      const refPx=pmp>0?Math.min(f.tgt||Infinity,pmp):(f.tgt||null);
      const signal=!(+f.cur>0)?"n":!refPx?"n":f.cur<=refPx?"g":f.cur<=refPx*1.1?"a":"r";
      const scn = f.priceUnit==="t" && tons!=null ? {
        low:  f.low!=null ? Math.round(secured*pmp+(left??0)*f.low):null,
        mid:  Math.round(secured*pmp+(left??0)*f.price),
        high: f.high!=null? Math.round(secured*pmp+(left??0)*f.high):null,
      } : null;
      return { f, need, tons:tons!=null?Math.round(tons*10)/10:null, secured, pmp, spent,
        left, cover, up, needCost, signal, scn,
        remainCost: left!=null && f.priceUnit==="t" ? Math.round(left*(+f.cur||+f.price||0)) : null,
        ecoDone: secured&&+f.cur>0?Math.round((f.cur-pmp)*secured):0,
        ecoPot:  left!=null&&+f.cur>0&&+f.tgt>0?Math.round((f.cur-f.tgt)*left):0,
        hist:FERT.histStats(f) };
    });
  },
  /** marges par culture ; prices = surcharge €/t {fertId:px} pour scénarios (sinon prix engrais) */
  margins(c, tonPrices) {
    const nit=this.nitrogen(c), fd=this.fond(c), ph=this.phyto(c), sd=this.seeds(c), surf=this.surfByCult(c);
    const seedByCult={};
    sd.rows.forEach(r=>{ seedByCult[r.parcel.cult]=(seedByCult[r.parcel.cult]||0)+(r.cost||0); });
    const fertCultCost = cu => {
      let sum=0;
      const n=nit.byCult[cu.id]||{sol39:0,n33:0};
      [["sol39",n.sol39],["n33",n.n33]].forEach(([id,qty])=>{
        const f=this.fert(c,id); if(!f) return;
        if(tonPrices&&tonPrices[id]!=null){ const cc=FERT.costAtTon(f,qty,tonPrices[id]); sum+=cc||0; }
        else { const cc=FERT.cost(f,qty); sum+=cc.cost||0; }
      });
      const bc=fd.byCult[cu.id];
      if(bc) Object.entries(bc.perFert).forEach(([id,qty])=>{
        const f=this.fert(c,id); if(!f) return;
        if(tonPrices&&tonPrices[id]!=null&&f.priceUnit==="t"){ const cc=FERT.costAtTon(f,qty,tonPrices[id]); sum+=cc||0; }
        else { const cc=FERT.cost(f,qty); sum+=cc.cost||0; }
      });
      return sum;
    };
    return c.cultures.filter(cu=>cu.id!=="jach"&&(surf[cu.id]||0)>0).map(cu=>{
      const a=surf[cu.id];
      const fertHa=fertCultCost(cu)/a;
      const seedHa=(seedByCult[cu.id]||0)/a;
      const phytoHa=(ph.byCult[cu.id]||0)/a;
      const pb=(cu.eco.rdt||0)*(cu.eco.prix||0);
      const margin=pb-seedHa-phytoHa-(cu.eco.autres||0)-fertHa;
      const seuil=cu.eco.rdt?(seedHa+phytoHa+(cu.eco.autres||0)+fertHa)/cu.eco.rdt:null;
      return { cu, area:a, pb, seedHa, phytoHa, autres:cu.eco.autres||0, fertHa, margin, seuil };
    });
  },
  scenarioPrices(c,key){ const o={}; c.fertilizers.forEach(f=>{
    if(f.priceUnit==="t") o[f.id]= key==="ref"?f.price:(f[key]!=null?f[key]:f.price); }); return o; },
  totals(c) {
    const nit=this.nitrogen(c), fd=this.fond(c), ph=this.phyto(c), sd=this.seeds(c);
    const surf=this.surfTot(c);
    const intr=nit.cost+fd.cost+ph.cost+sd.totCost;
    return { surf, nit, fd, ph, sd, intr, intrHa:surf?intr/surf:0 };
  },
};

const CHARTS = {
  donut(items,size=190){
    const tot=items.reduce((s,i)=>s+i.value,0)||1;
    const R=size/2,r=R-26,C=2*Math.PI*r; let off=0;
    const segs=items.filter(i=>i.value>0).map(i=>{ const dash=i.value/tot*C;
      const s=`<circle r="${r}" cx="${R}" cy="${R}" fill="none" stroke="${i.color}" stroke-width="24" stroke-dasharray="${dash} ${C-dash}" stroke-dashoffset="${-off}" transform="rotate(-90 ${R} ${R})"/>`;
      off+=dash; return s; }).join("");
    return `<svg viewBox="0 0 ${size} ${size}" style="max-width:${size}px;width:100%">${segs}
      <text x="${R}" y="${R-4}" text-anchor="middle" font-size="21" font-weight="800" fill="#242B31">${fmt(tot,1)}</text>
      <text x="${R}" y="${R+15}" text-anchor="middle" font-size="10.5" fill="#8B949C" letter-spacing="1">HECTARES</text></svg>`;
  },
  bars(items,unit="€"){
    const max=Math.max(...items.map(i=>Math.abs(i.value)),1);

      <div class="bar-row"><span title="${i.label}" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${i.label}</span>
        <div class="tr"><i style="width:${Math.abs(i.value)/max*100}%;background:${i.color||"var(--orange)"}"></i></div>
        <span class="vv">${fmt(i.value)}${unit?" "+unit:""}</span></div>`).join("");
  },
};

const HectarisAssistant = {
  audio:null,
  getAudio(){
    if(this.audio) return this.audio;
    this.audio=new Audio("briefing-hectaris.mp3");
    this.audio.preload="auto";
    this.audio.addEventListener("timeupdate",()=>this.sync());
    this.audio.addEventListener("play",()=>this.sync());
    this.audio.addEventListener("pause",()=>this.sync());
    this.audio.addEventListener("ended",()=>{ this.audio.currentTime=0; this.sync(); });
    this.audio.addEventListener("error",()=>this.error());
    return this.audio;
  },
  toggle(){
    const a=this.getAudio();
    if(a.paused) a.play().catch(()=>this.error()); else a.pause();
  },
  stop(){ const a=this.getAudio(); a.pause(); a.currentTime=0; this.sync(); },
  sync(){
    const a=this.audio, box=document.getElementById("ai-brief"); if(!a||!box) return;
    const playing=!a.paused&&!a.ended;
    box.classList.toggle("playing",playing);
    const label=document.getElementById("ai-play-label");
    if(label) label.textContent=playing?"Mettre en pause":a.currentTime>0?"Reprendre le briefing":"Lancer mon briefing";
    const icon=document.getElementById("ai-play-icon");
    if(icon) icon.innerHTML=playing?'<path d="M6 4h4v16H6zM14 4h4v16h-4z"/>':'<path d="M8 5v14l11-7z"/>';
    const status=document.getElementById("ai-status-text");
    if(status) status.textContent=playing?"Briefing personnalisé en cours":a.currentTime>0?"Briefing en pause":"Votre synthèse stratégique est prête";
    const progress=document.getElementById("ai-progress-bar");
    if(progress) progress.style.width=(a.duration?Math.min(100,a.currentTime/a.duration*100):0)+"%";
    const stop=document.getElementById("ai-stop"); if(stop) stop.disabled=!a.currentTime;
  },
  error(){
    const status=document.getElementById("ai-status-text");
    if(status) status.textContent="Audio introuvable — placez briefing-hectaris.mp3 à côté de index.html";
    document.getElementById("ai-brief")?.classList.remove("playing");
  }
};

  pg_asso() {
    const c=Store.camp, by=CALC.surfByCult(c), tot=CALC.surfTot(c);
    const shown=this.applyPrevFilt(CALC.active(c));
    const rows=shown.map(p=>`<tr>
        <td class="muted">${p.num??""}</td><td><b>${p.name}</b></td>
        <td>${this.inp("parcels",p.id,"area",p.area,{w:70})}</td>
        <td>${this.prevSel(p)}</td>
        <td>${this.sel("parcels",p.id,"cult",p.cult,this.cultOpts(true))}</td>
        <td>${this.sel("parcels",p.id,"vari",p.vari,this.variOpts(p.cult))}</td>
        <td>${this.inp("parcels",p.id,"commune",p.commune,{num:false,w:90})}</td>
        <td>${this.sel("parcels",p.id,"storage",p.storage,[{v:"",l:"—"},{v:"bran",l:place(c,"bran")},{v:"fouch",l:place(c,"fouch")}])}</td>
        <td>${this.inp("parcels",p.id,"comment",p.comment,{num:false,w:150})}</td></tr>`).join("");
    const rep=c.cultures.filter(cu=>by[cu.id]>0).map(cu=>({label:cu.name,value:Math.round(by[cu.id]*100)/100,color:cu.color}));
    return `
    <div class="page-head"><div><h1>Assolement</h1><p>Une ligne = une parcelle. Toute modification se propage aux semences, à l'azote, aux engrais, aux interventions et au prévisionnel.</p></div>
      <div class="actions"><select class="ed" style="border:1px solid var(--line);border-radius:9px;padding:7px 10px;background:#fff"
        onchange="UI._prevFilt=this.value;UI.render()">${this.prevFiltOpts(CALC.active(c))}</select>
      <button class="btn" onclick="UI.go('parc')">Gérer le parcellaire</button>
      <button class="btn pri" onclick="UI.addParcel()">＋ Nouvelle parcelle</button></div></div>
    <div class="grid g3" style="margin-bottom:16px">
      <div class="kpi" style="--k:var(--green)"><div class="l">Surface totale</div><div class="v">${fmt(tot,2)} ha</div><div class="s">${CALC.active(c).length} parcelles</div></div>
      <div class="card"><div class="bd" style="padding:14px 18px">${CHARTS.bars(rep,"ha")}</div></div>
      <div class="card"><div class="hd"><h2>Lieux de stockage azote</h2></div><div class="bd">
        ${["bran","fouch"].map(k=>{const s=CALC.active(c).filter(p=>p.storage===k).reduce((a,p)=>a+ +p.area,0);
          return `<div class="bar-row"><span>${place(c,k)}</span><div class="tr"><i style="width:${tot?s/tot*100:0}%;background:var(--blue)"></i></div><span class="vv">${fmt(s,2)} ha</span></div>`;}).join("")}
      </div></div></div>
    <div class="card"><div class="tb-wrap"><table class="tb"><thead><tr>
      <th>N°</th><th>Parcelle</th><th>Surface (ha)</th><th>Précédent cultural</th><th>Culture</th><th>Variété</th><th>Commune</th><th>Stockage azote</th><th>Commentaire</th>
    </tr></thead><tbody>${rows}
    <tr class="tot"><td></td><td>TOTAL${this._prevFilt?" (filtré)":""}</td><td>${fmt(shown.reduce((s,p)=>s+ +p.area,0),2)} ha</td><td colspan="6">${Object.keys(by).length} cultures</td></tr>
    </tbody></table></div></div>` + this.assoPrevSynth(c);
  },
  assoPrevSynth(c) {
    const act=CALC.active(c), sau=CALC.surfTot(c)||1;
    const m={};
    act.forEach(p=>{ const k=p.prev||"Non renseigné";
      const b=m[k]||(m[k]={area:0,n:0}); b.area+=+p.area||0; b.n++; });
    const rows=Object.entries(m).sort((a,b)=>b[1].area-a[1].area).map(([k,b])=>
      `<tr><td>${k==="Non renseigné"?'<span class="muted">Non renseigné</span>':"<b>"+k+"</b>"}</td>
      <td class="num">${fmt(b.area,2)} ha</td><td class="num">${fmt(b.area/sau*100,1)} %</td><td class="num">${b.n}</td></tr>`).join("");
    return `<div class="card" style="margin-top:16px"><div class="hd"><h2>Répartition des précédents culturaux</h2>
      <span class="sub">rotation — campagne ${Store.data.active}</span></div>
      <div class="tb-wrap"><table class="tb"><thead><tr><th>Précédent</th><th class="num">Surface</th><th class="num">% SAU</th><th class="num">Parcelles</th></tr></thead>
      <tbody>${rows||'<tr><td colspan="4" class="empty">Aucune parcelle</td></tr>'}</tbody></table></div></div>`;
  },

  /* ---------- PARCELLAIRE ---------- */
  pg_parc() {
    const c=Store.camp;
    const shown=c.parcels.filter(p=>p.archived||!this._prevFilt?true:true).filter(p=>{
      if(!this._prevFilt) return true;
      if(this._prevFilt==="__none") return !p.prev;
      return p.prev===this._prevFilt; });
    const row=p=>`<tr style="${p.archived?'opacity:.45':''}">
      <td><input type="checkbox" class="check pk" data-id="${p.id}"></td>
      <td class="muted">${p.num??""}</td><td><b>${p.name}</b>${p.archived?' <span class="tag">archivée</span>':''}</td>
      <td>${p.commune||"—"}</td><td class="num">${fmt(p.area,2)}</td>
      <td>${this.prevSel(p)}</td>
      <td>${CALC.cult(c,p.cult)?.name||"—"}</td><td>${place(c,p.storage)}</td>
      <td style="white-space:nowrap">
        <button class="btn sm" onclick="UI.editParcel('${p.id}')">Modifier</button>
        <button class="btn sm" onclick="UI.splitParcel('${p.id}')">Diviser</button>
        <button class="btn sm ghost" onclick="UI.toggleArchive('${p.id}')">${p.archived?"Restaurer":"Archiver"}</button>
        <button class="btn sm ghost danger" onclick="UI.delParcel('${p.id}')">Suppr.</button></td></tr>`;
    return `
    <div class="page-head"><div><h1>Parcellaire</h1><p>Créer, modifier, diviser, fusionner ou archiver. Cochez plusieurs parcelles pour les fusionner.</p></div>
      <div class="actions"><select class="ed" style="border:1px solid var(--line);border-radius:9px;padding:7px 10px;background:#fff"
        onchange="UI._prevFilt=this.value;UI.render()">${this.prevFiltOpts(c.parcels)}</select>
      <button class="btn" onclick="UI.mergeParcels()">Fusionner la sélection</button>
      <button class="btn pri" onclick="UI.addParcel()">＋ Nouvelle parcelle</button></div></div>
    <div class="card"><div class="tb-wrap"><table class="tb"><thead><tr>
      <th></th><th>N°</th><th>Nom</th><th>Commune</th><th class="num">Surface</th><th>Précédent cultural</th><th>Culture</th><th>Stockage</th><th>Actions</th>
    </tr></thead><tbody>${shown.map(row).join("")||'<tr><td colspan="9" class="empty">Aucune parcelle — créez la première ou changez le filtre.</td></tr>'}</tbody></table></div></div>`;
  },
  parcelForm(p={}) {
    const prevOptions=this.prevOpts().filter(o=>o.v!=="__autre").map(o=>
      `<option value="${o.v}" ${o.v===(p.prev||"")?"selected":""}>${o.l}</option>`).join("")
      + `<option value="__autre">Autre (saisie libre)…</option>`;
    return `<div class="frow">
      <div class="field"><label>Nom</label><input id="m-name" value="${p.name||""}"></div>
      <div class="field"><label>N°</label><input id="m-num" value="${p.num??""}"></div></div>
    <div class="frow">
      <div class="field"><label>Commune</label><input id="m-com" value="${p.commune||""}"></div>
      <div class="field"><label>Surface (ha)</label><input id="m-area" type="number" step="0.01" value="${p.area??""}"></div></div>
    <div class="frow">
      <div class="field"><label>Précédent cultural</label><select id="m-prev"
        onchange="document.getElementById('m-prev-libre').style.display=this.value==='__autre'?'block':'none'">${prevOptions}</select>
        <input id="m-prev-libre" placeholder="Précédent libre…" value="${(p.prev||"").replace(/"/g,'&quot;')}" style="display:none;margin-top:6px"></div>
      <div class="field"><label>Culture</label><select id="m-cult">${this.cultOpts(true).map(o=>`<option value="${o.v}" ${o.v===(p.cult||"")?"selected":""}>${o.l}</option>`).join("")}</select></div></div>
    <div class="frow">
      <div class="field"><label>Lieu de stockage azote</label><select id="m-sto">
        ${[["","—"],["bran",place(Store.camp,"bran")],["fouch",place(Store.camp,"fouch")]].map(([v,l])=>`<option value="${v}" ${v===(p.storage||"")?"selected":""}>${l}</option>`).join("")}</select></div>
      <div class="field"><label>Commentaire</label><input id="m-cmt" value="${p.comment||""}"></div></div>`;
  },
  readPrevForm(){
    const sel=this.mval("m-prev");
    return sel==="__autre" ? this.mval("m-prev-libre") : sel;
  },
  addParcel() {
    this.modal("Nouvelle parcelle",this.parcelForm(),()=>{
      const name=this.mval("m-name"); if(!name){ this.toast("Un nom est requis"); return false; }
      Store.mutate(c=>c.parcels.push({ id:uid(), num:this.mval("m-num"), name,
        area:+this.mval("m-area")||0, commune:this.mval("m-com"), cult:this.mval("m-cult"),
        vari:"", storage:this.mval("m-sto"), prev:this.readPrevForm(), comment:this.mval("m-cmt"), archived:false, nOv:{}, fOv:{} }));
      this.toast("Parcelle créée"); },"Créer");
  },
  editParcel(id) {
    const p=Store.camp.parcels.find(x=>x.id===id);
    this.modal("Modifier « "+p.name+" »",this.parcelForm(p),()=>{
      Store.mutate(c=>{ Object.assign(p,{ num:this.mval("m-num"), name:this.mval("m-name")||p.name,
        area:+this.mval("m-area")||0, commune:this.mval("m-com"), cult:this.mval("m-cult"),
        storage:this.mval("m-sto"), prev:this.readPrevForm(), comment:this.mval("m-cmt") }); }); });
  },
  splitParcel(id) {
    const p=Store.camp.parcels.find(x=>x.id===id);
    const half=Math.round(p.area/2*100)/100;
    this.modal("Diviser « "+p.name+" »",
      `<p class="hint" style="margin-bottom:12px">Surface actuelle : <b>${fmt(p.area,2)} ha</b>. Cultures et réglages conservés sur les deux parties.</p>
      <div class="frow"><div class="field"><label>Surface partie 1 (ha)</label><input id="m-a1" type="number" step="0.01" value="${half}"></div>
      <div class="field"><label>Nom partie 2</label><input id="m-n2" value="${p.name} (2)"></div></div>`,
      ()=>{ const a1=+this.mval("m-a1"); if(!(a1>0&&a1<p.area)){ this.toast("Surface partie 1 invalide"); return false; }
        Store.mutate(c=>{ const a2=Math.round((p.area-a1)*100)/100;
          const copy=JSON.parse(JSON.stringify(p));
          copy.id=uid(); copy.name=this.mval("m-n2")||p.name+" (2)"; copy.area=a2;
          p.area=a1; c.parcels.splice(c.parcels.indexOf(p)+1,0,copy); });
        this.toast("Parcelle divisée"); },"Diviser");
  },
  mergeParcels() {
    const ids=[...document.querySelectorAll(".pk:checked")].map(x=>x.dataset.id);
    if(ids.length<2){ this.toast("Cochez au moins 2 parcelles à fusionner"); return; }
    const c=Store.camp, ps=ids.map(i=>c.parcels.find(p=>p.id===i));
    const tot=ps.reduce((s,p)=>s+ +p.area,0);
    this.modal("Fusionner "+ids.length+" parcelles",
      `<p class="hint" style="margin-bottom:12px">${ps.map(p=>"<b>"+p.name+"</b> ("+fmt(p.area,2)+" ha)").join(" + ")} = <b>${fmt(tot,2)} ha</b>. La première est conservée.</p>
      <div class="field"><label>Nom de la parcelle fusionnée</label><input id="m-name" value="${ps[0].name}"></div>`,
      ()=>{ Store.mutate(cc=>{ ps[0].name=this.mval("m-name")||ps[0].name;
          ps[0].area=Math.round(tot*100)/100;
          ps.slice(1).forEach(p=>cc.parcels.splice(cc.parcels.indexOf(p),1)); });
        this.toast("Parcelles fusionnées"); },"Fusionner");
  },
  toggleArchive(id){ Store.mutate(c=>{ const p=c.parcels.find(x=>x.id===id); p.archived=!p.archived; }); },
  delParcel(id) {
    const p=Store.camp.parcels.find(x=>x.id===id);
    this.modal("Supprimer « "+p.name+" »",
      `<p class="hint">Suppression définitive pour la campagne ${Store.data.active}. Préférez <b>Archiver</b> pour conserver l'historique.</p>`,
      ()=>{ Store.mutate(c=>{ c.parcels.splice(c.parcels.indexOf(p),1); }); this.toast("Parcelle supprimée"); },"Supprimer");
  },

  /* ---------- SEMENCES ---------- */
  pg_seed() {
    const c=Store.camp, s=CALC.seeds(c);
    const rows=s.rows.map(r=>`<tr>
      <td><b>${r.parcel.name}</b></td><td>${CALC.cult(c,r.parcel.cult)?.name||""}</td><td>${r.v.name}</td>
      <td class="num">${fmt(r.parcel.area,2)}</td>
      <td class="num">${r.kgHa!=null?fmt(r.kgHa):"—"}</td><td class="num calc">${r.kg!=null?fmt(r.kg):"—"}</td>
      <td class="num">${r.doseHa!=null?fmt(r.doseHa,1):"—"}</td><td class="num calc">${r.doses!=null?fmt(r.doses,1):"—"}</td>
      <td class="num muted">${r.price?fmt(r.price,2):"—"}</td><td class="num calc">${r.price?eur(r.cost):MISS}</td></tr>`).join("");
    const syn=Object.values(s.byVar).map(b=>{ const so=c.seedOrders;
      return `<tr><td><b>${b.v.name}</b></td><td>${CALC.cult(c,b.v.cult)?.name||""}</td>
      <td class="num calc">${b.kg?fmt(b.kg)+" kg":fmt(b.doses,1)+" doses"}</td>
      <td><input class="num ed" style="width:70px" value="${so[b.v.id]?.stock??""}" onchange="UI.setSeedOrder('${b.v.id}','stock',this.value)"></td>
      <td><input class="num ed" style="width:70px" value="${so[b.v.id]?.ordered??""}" onchange="UI.setSeedOrder('${b.v.id}','ordered',this.value)"></td>
      <td class="num calc" style="font-weight:750;${b.left>0?'color:var(--orange)':''}">${fmt(b.left,1)}</td>
      <td class="num calc">${eur(b.cost)}</td></tr>`;}).join("");
    return `
    <div class="page-head"><div><h1>Semences</h1>
      <p>Céréales : kg/ha = PMG × grains/m² ÷ ${c.params.pmgDiv}. Colza & tournesol : doses = surface × dose/ha, à une décimale. Prix issus des variétés.</p></div>
      <div class="actions"><button class="btn" onclick="UI.go('cult')">Modifier les variétés</button></div></div>
    <div class="grid g3" style="margin-bottom:16px">
      <div class="kpi" style="--k:#8C5E2A"><div class="l">Besoin céréales</div><div class="v">${fmt(s.totKg)} kg</div><div class="s">blés & orges</div></div>
      <div class="kpi" style="--k:#F2C230"><div class="l">Besoin colza & tournesol</div><div class="v">${fmt(s.totDoses,1)} doses</div><div class="s"></div></div>
      <div class="kpi" style="--k:var(--orange)"><div class="l">Coût semences</div><div class="v">${eur(s.totCost)}</div><div class="s">${eurHa(s.totCost/(CALC.surfTot(c)||1))} en moyenne</div></div>
    </div>
    <div class="card"><div class="hd"><h2>Synthèse par variété — stock & commandes</h2><span class="sub">reste = besoin − stock − commandé</span></div>
      <div class="tb-wrap"><table class="tb"><thead><tr>
      <th>Variété</th><th>Culture</th><th class="num">Besoin</th><th>Stock</th><th>Déjà commandé</th><th class="num">Reste à commander</th><th class="num">Coût besoin</th>
      </tr></thead><tbody>${syn}</tbody></table></div></div>
    <div class="card" style="margin-top:16px"><div class="hd"><h2>Détail par parcelle</h2></div>
      <div class="tb-wrap"><table class="tb"><thead><tr>
      <th>Parcelle</th><th>Culture</th><th>Variété</th><th class="num">ha</th><th class="num">kg/ha</th><th class="num">kg</th>
      <th class="num">Doses/ha</th><th class="num">Doses</th><th class="num">Prix</th><th class="num">Coût</th>
      </tr></thead><tbody>${rows}
      <tr class="tot"><td colspan="5">TOTAL</td><td class="num">${fmt(s.totKg)}</td><td></td><td class="num">${fmt(s.totDoses,1)}</td><td></td><td class="num">${eur(s.totCost)}</td></tr>
      </tbody></table></div></div>`;
  },
  setSeedOrder(vid,key,val){ Store.mutate(c=>{ if(!c.seedOrders[vid]) c.seedOrders[vid]={};
    c.seedOrders[vid][key]= val===""?0:+val; }); },
  /* ---------- CULTURES & VARIÉTÉS (colonnes fond dynamiques) ---------- */
  pg_cult() {
    const c=Store.camp, by=CALC.surfByCult(c), ff=CALC.fondFerts(c);
    const cultRows=c.cultures.map(cu=>`<tr>
      <td><i style="display:inline-block;width:11px;height:11px;border-radius:3px;background:${cu.color};margin-right:7px"></i><b>${cu.name}</b></td>
      <td class="num muted">${fmt(by[cu.id]||0,2)} ha</td>
      <td>${this.inp("cultures",cu.id,"a1",cu.n.a1,{deep:"n",w:50})}</td>
      <td>${this.inp("cultures",cu.id,"a2",cu.n.a2,{deep:"n",w:50})}</td>
      <td>${this.inp("cultures",cu.id,"a3",cu.n.a3,{deep:"n",w:50})}</td>
      <td>${this.sel("cultures",cu.id,"f3",cu.n.f3,[{v:"sol39",l:"Sol.39"},{v:"n33",l:"N33"}],{deep:"n"})}</td>
      <td>${this.inp("cultures",cu.id,"a4",cu.n.a4,{deep:"n",w:50})}</td>
      <td>${this.sel("cultures",cu.id,"f4",cu.n.f4,[{v:"sol39",l:"Sol.39"},{v:"n33",l:"N33"}],{deep:"n"})}</td>
      ${ff.map(f=>`<td>${this.inp("cultures",cu.id,f.id,cu.fond?.[f.id],{deep:"fond",w:54})}</td>`).join("")}
      <td>${this.inp("cultures",cu.id,"rdt",cu.eco.rdt,{deep:"eco",w:50})}</td>
      <td>${this.inp("cultures",cu.id,"prix",cu.eco.prix,{deep:"eco",w:56})}</td>
      <td>${this.inp("cultures",cu.id,"autres",cu.eco.autres,{deep:"eco",w:56})}</td>
      <td><button class="btn sm ghost danger" onclick="UI.delCulture('${cu.id}')">✕</button></td></tr>`).join("");
    const varRows=c.varieties.map(v=>`<tr>
      <td>${this.sel("varieties",v.id,"cult",v.cult,this.cultOpts(false))}</td>
      <td>${this.inp("varieties",v.id,"name",v.name,{num:false,w:220})}</td>
      <td>${this.inp("varieties",v.id,"pmg",v.pmg,{w:50})}</td>
      <td>${this.inp("varieties",v.id,"grains",v.grains,{w:56})}</td>
      <td>${this.inp("varieties",v.id,"dose",v.dose,{w:50})}</td>
      <td>${this.inp("varieties",v.id,"prixKg",v.prixKg,{w:56})}</td>
      <td>${this.inp("varieties",v.id,"prixDose",v.prixDose,{w:56})}</td>
      <td>${this.inp("varieties",v.id,"comment",v.comment,{num:false,w:180})}</td>
      <td><button class="btn sm ghost danger" onclick="UI.delVariety('${v.id}')">✕</button></td></tr>`).join("");
    return `
    <div class="page-head"><div><h1>Cultures & variétés</h1>
      <p>Doses d'azote par apport (uN/ha), doses d'engrais de fond (une colonne par engrais créé) et hypothèses économiques.</p></div>
      <div class="actions"><button class="btn" onclick="UI.addVariety()">＋ Variété</button>
      <button class="btn pri" onclick="UI.addCulture()">＋ Culture</button></div></div>
    <div class="card"><div class="hd"><h2>Cultures — doses par défaut & économie</h2>
      <span class="sub">azote en uN/ha · fond selon l'unité de chaque engrais</span></div>
      <div class="tb-wrap"><table class="tb"><thead><tr>
      <th>Culture</th><th class="num">Sole</th><th>A1</th><th>A2</th><th>A3</th><th>Forme A3</th><th>A4</th><th>Forme A4</th>
      ${ff.map(f=>`<th>${f.name}<div class="muted" style="font-weight:400;text-transform:none">${f.appUnit}</div></th>`).join("")}
      <th>Rdt t/ha</th><th>Prix €/t</th><th>Autres €/ha</th><th></th>
      </tr></thead><tbody>${cultRows}</tbody></table></div></div>
    <div class="card" style="margin-top:16px"><div class="hd"><h2>Variétés</h2>
      <span class="sub">PMG & grains/m² → céréales (kg) · dose/ha → colza & tournesol</span></div>
      <div class="tb-wrap"><table class="tb"><thead><tr>
      <th>Culture</th><th>Variété</th><th>PMG</th><th>Grains/m²</th><th>Dose/ha</th><th>Prix €/kg</th><th>Prix €/dose</th><th>Commentaire</th><th></th>
      </tr></thead><tbody>${varRows}</tbody></table></div></div>`;
  },
  addCulture() {
    this.modal("Nouvelle culture",
      `<div class="frow"><div class="field"><label>Nom</label><input id="m-name" placeholder="Pois de printemps"></div>
      <div class="field"><label>Couleur</label><input id="m-col" type="color" value="#7E9E6B" style="height:38px"></div></div>`,
      ()=>{ const n=this.mval("m-name"); if(!n) return false;
        Store.mutate(c=>c.cultures.push({ id:uid(), name:n, color:document.getElementById("m-col").value,
          n:{a1:0,a2:0,a3:0,a4:0,f3:"sol39",f4:"sol39"}, fond:{}, eco:{rdt:0,prix:0,autres:420} }));
        this.toast("Culture ajoutée — renseignez ses doses"); },"Ajouter");
  },
  delCulture(id) {
    const c=Store.camp;
    if(c.parcels.some(p=>p.cult===id)){ this.toast("Impossible : des parcelles utilisent cette culture"); return; }
    Store.mutate(cc=>{ cc.cultures.splice(cc.cultures.findIndex(x=>x.id===id),1); });
  },
  addVariety(){ Store.mutate(c=>c.varieties.push({ id:uid(), cult:c.cultures[0].id, name:"Nouvelle variété",
      pmg:null, grains:null, dose:null, prixKg:null, prixDose:null, comment:"" }));
    this.toast("Variété ajoutée en bas de liste"); },

  fertForm(f={}) {
    const opt=(list,cur)=>Object.entries(list).map(([v,l])=>`<option value="${v}" ${v===(cur||"")?"selected":""}>${l}</option>`).join("");
    return `<div class="frow">
      <div class="field"><label>Nom de l'engrais *</label><input id="m-name" value="${f.name||""}"></div>
      <div class="field"><label>Catégorie</label><select id="m-cat">
        <option value="fond" ${f.cat!=="azote"?"selected":""}>Engrais de fond</option>
        <option value="azote" ${f.cat==="azote"?"selected":""}>Azote</option></select></div></div>
    <div class="frow">
      <div class="field"><label>Unité d'application</label><select id="m-app">${opt({"kg/ha":"kg/ha","t/ha":"t/ha","l/ha":"l/ha","u/ha":"unités/ha","dose/ha":"doses/ha"},f.appUnit||"kg/ha")}</select></div>
      <div class="field"><label>Unité commerciale du prix</label><select id="m-pu">${opt(PRICE_UNITS,f.priceUnit||"t")}</select></div></div>
    <div class="frow">
      <div class="field"><label>Prix</label><input id="m-price" type="number" step="0.01" value="${f.price??""}"></div>
      <div class="field"><label>Densité (kg/L) — requise si appliqué en l/ha et acheté au poids</label><input id="m-dens" type="number" step="0.01" value="${f.density??""}" placeholder="1.30"></div></div>
    <div class="frow">
      <div class="field"><label>Fournisseur</label><input id="m-sup" value="${f.supplier||""}"></div>
      <div class="field"><label>Composition</label><input id="m-comp" value="${f.composition||""}"></div></div>
    <div class="field"><label>Commentaire</label><input id="m-cmt" value="${f.comment||""}"></div>`;
  },
  readFertForm(f) {
    const name=this.mval("m-name");
    if(!name){ this.toast("Un nom est requis"); return false; }
    const price=this.mnum("m-price");
    if(price!=null&&price<0){ this.toast("Prix négatif interdit"); return false; }
    const dens=this.mnum("m-dens");
    if(dens!=null&&dens<=0){ this.toast("La densité doit être positive"); return false; }
    const app=this.mval("m-app"), pu=this.mval("m-pu");
    const tmp={ appUnit:app, priceUnit:pu, price:price||0, density:dens };
    if(price>0){ const up=FERT.unitPrice(tmp); if(!up.ok&&up.reason.startsWith("Unités")){ this.toast("⚠ "+up.reason); return false; } }
    Object.assign(f,{ name, cat:this.mval("m-cat"), appUnit:app, priceUnit:pu,
      density:dens, supplier:this.mval("m-sup"), composition:this.mval("m-comp"), comment:this.mval("m-cmt") });
    if(price!=null&&price!==f.price){
      f.price=price; f.priceUpdated=today();
      (f.history=f.history||[]).push({ id:uid(), date:today(), supplier:f.supplier, price, unit:pu, qty:"", comment:"", retained:true });
    }
    return true;
  },
  addFert(cat) {
    this.modal("Nouvel engrais",this.fertForm({cat,density:null}),()=>{
      const f={ id:uid(), tenor:null, active:true, history:[], stock:0, cur:null, tgt:null, low:null, high:null, decision:"Surveiller", pct:0, priceUpdated:today() };
      if(this.readFertForm(f)===false) return false;
      Store.mutate(c=>c.fertilizers.push(f));
      this.toast("Engrais créé — il apparaît dans Cultures, Fond, Prévisionnel et exports"); },"Créer");
  },
  editFert(id) {
    const f=Store.camp.fertilizers.find(x=>x.id===id);
    this.modal("Modifier « "+f.name+" »",this.fertForm(f),()=>{
      let ok; Store.mutate(()=>{ ok=this.readFertForm(f); },true);
      if(ok===false) return false; Store.persist(); UI.render(); });
  },
  dupFert(id) {
    Store.mutate(c=>{ const f=c.fertilizers.find(x=>x.id===id);
      const copy=JSON.parse(JSON.stringify(f)); copy.id=uid(); copy.name=f.name+" (copie)"; copy.history=[];
      c.fertilizers.splice(c.fertilizers.indexOf(f)+1,0,copy); });
    this.toast("Engrais dupliqué");
  },
  toggleFert(id){ Store.mutate(c=>{ const f=c.fertilizers.find(x=>x.id===id); f.active=f.active===false; }); },
  delFert(id) {
    const c=Store.camp, f=c.fertilizers.find(x=>x.id===id);
    const used = Object.values(Store.data.campaigns).some(cc=>
      cc.cultures.some(cu=>+cu.fond?.[id]>0) || cc.parcels.some(p=>p.fOv?.[id]!=null) || cc.purchases.some(b=>b.fert===id))
      || f.id==="sol39" || f.id==="n33";
    this.modal("Supprimer « "+f.name+" »",
      used?`<p class="hint">⚠ Cet engrais est <b>utilisé dans une campagne</b> (doses, achats ou azote). La suppression casserait l'historique : préférez <b>Archiver</b>.</p>`
          :`<p class="hint">Suppression définitive de l'engrais et de son historique de prix.</p>`,
      ()=>{ if(used){ Store.mutate(cc=>{ f.active=false; }); this.toast("Engrais archivé (utilisé dans une campagne)"); }
        else { Store.mutate(cc=>{ cc.fertilizers.splice(cc.fertilizers.indexOf(f),1); }); this.toast("Engrais supprimé"); } },
      used?"Archiver":"Supprimer");
  },
  fertHistory(id) {
    const f=Store.camp.fertilizers.find(x=>x.id===id), h=FERT.histStats(f);
    const rows=(f.history||[]).slice().sort((a,b)=>(b.date||"").localeCompare(a.date||"")).map(x=>`<tr>
      <td>${x.date||"—"}</td><td>${x.supplier||"—"}</td><td class="num"><b>${fmt(x.price,2)}</b> ${PRICE_UNITS[x.unit]||""}</td>
      <td>${x.qty||"—"}</td><td>${x.retained?'<span class="chip sig-g"><i></i>Retenu</span>':'<span class="chip sig-n"><i></i>Non retenu</span>'}</td>
      <td class="muted">${x.comment||""}</td></tr>`).join("");
    this.modal("Historique des prix — "+f.name,
      `${h?`<p class="hint" style="margin-bottom:10px">Dernier : <b>${fmt(h.last)}</b> (${h.lastDate}) · meilleur : <b>${fmt(h.best)}</b> · moyen : <b>${fmt(h.avg)}</b>
        ${h.delta!=null?" · écart vs précédent : <b>"+(h.delta>0?"+":"")+fmt(h.delta)+"</b>":""} · ${h.count} relevé(s)</p>`:""}
      <div style="max-height:38vh;overflow:auto"><table class="tb"><thead><tr>
      <th>Date</th><th>Fournisseur</th><th class="num">Prix</th><th>Qté proposée</th><th>Décision</th><th>Commentaire</th></tr></thead>
      <tbody>${rows||'<tr><td colspan="6" class="empty">Aucun relevé</td></tr>'}</tbody></table></div>

      <b style="font-size:13px">Ajouter un relevé de prix</b>
      <div class="frow" style="margin-top:8px">
        <div class="field"><label>Date</label><input id="mh-date" type="date" value="${today()}"></div>
        <div class="field"><label>Fournisseur</label><input id="mh-sup" value="${f.supplier||""}"></div></div>
      <div class="frow">
        <div class="field"><label>Prix (${PRICE_UNITS[f.priceUnit]})</label><input id="mh-price" type="number" step="0.01"></div>
        <div class="field"><label>Quantité proposée</label><input id="mh-qty"></div></div>
      <div class="frow">
        <div class="field"><label>Commentaire</label><input id="mh-cmt"></div>
        <div class="field"><label>Prix retenu ?</label><select id="mh-ret"><option value="1">Oui — devient le prix de l'engrais</option><option value="0">Non — simple relevé</option></select></div></div></div>`,
      ()=>{ const price=this.mnum("mh-price");
        if(price==null){ this.closeModal(); return; }
        if(price<=0){ this.toast("Prix invalide"); return false; }
        const retained=this.mval("mh-ret")==="1";
        Store.mutate(c=>{ f.history.push({ id:uid(), date:this.mval("mh-date"), supplier:this.mval("mh-sup"),

  },
  addPurchase() {
    const c=Store.camp;
    this.modal("Enregistrer un achat d'engrais",
      `<div class="frow">
