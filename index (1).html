          <div style="font-size:12px;font-weight:700;color:var(--tx-2)">${medailles[i]||(i+1)+"."} ${x.f.name}</div>
          <div style="font-size:26px;font-weight:850;color:var(--green);letter-spacing:-.5px;margin:3px 0">${fmt(x.un.val,2)} €/u N</div>
          <div class="muted" style="font-size:11.5px">${fmt(x.f.price)} ${PRICE_UNITS[x.f.priceUnit]}${x.f.appUnit==="l/ha"?" · densité "+(x.f.density??"—"):""} · teneur ${x.f.tenor??"—"}</div>
        </div>`).join("")}
      ${azotes.filter(x=>!x.un.ok).map(x=>`
        <div style="flex:1;min-width:210px;border:1px dashed var(--line);border-radius:12px;padding:13px 16px">
          <div style="font-size:12px;font-weight:700;color:var(--tx-2)">${x.f.name}</div>
          <div class="miss" style="font-size:15px;margin:6px 0">${x.un.reason}</div>
        </div>`).join("")}
      </div></div>` : "";
    const rows=c.fertilizers.map(f=>{
      const up=FERT.unitPrice(f), h=FERT.histStats(f);
      const un=FERT.nitrogenUnitPrice(f);
      const rang=classes.findIndex(x=>x.f.id===f.id);
      const unCell = f.cat!=="azote" ? '<span class="muted">—</span>'
        : un.ok ? `<span style="font-size:16px;font-weight:850;color:var(--green);white-space:nowrap">${rang>=0&&rang<3?medailles[rang]+" ":""}${fmt(un.val,2)} €/u N</span>`
        : `<span class="miss">${un.reason}</span>`;
      return `<tr style="${f.active===false?'opacity:.45':''}">
      <td><b>${f.name}</b>${f.active===false?' <span class="tag">archivé</span>':''}
        <div class="muted" style="font-size:11.5px">${f.cat==="azote"?"Azote":"Fond"} · ${f.supplier||"—"}${f.composition?" · "+f.composition:""}</div></td>
      <td>${f.appUnit}</td><td>${PRICE_UNITS[f.priceUnit]}</td>
      <td class="num" style="font-weight:700">${+f.price>0?fmt(f.price,f.priceUnit==="kg"||f.priceUnit==="L"?2:0):MISS}</td>
      <td class="num muted">${up.ok?(up.label||"forfait"):'<span class="miss">'+up.reason+'</span>'}</td>
      <td class="num">${unCell}</td>
      <td class="num">${f.density??"—"}</td>
      <td class="muted">${f.priceUpdated||"—"}</td>
      <td>${h?`<span class="muted">dernier ${fmt(h.last)} · meilleur ${fmt(h.best)} · moy. ${fmt(h.avg)}${h.delta!=null?" · "+(h.delta>0?"▲ +":"▼ ")+fmt(h.delta):""}</span>`:"—"}</td>
      <td style="white-space:nowrap">
        <button class="btn sm" onclick="UI.editFert('${f.id}')">Modifier</button>
        <button class="btn sm" onclick="UI.fertHistory('${f.id}')">Historique</button>
        <button class="btn sm ghost" onclick="UI.dupFert('${f.id}')">Dupliquer</button>
        <button class="btn sm ghost" onclick="UI.toggleFert('${f.id}')">${f.active===false?"Restaurer":"Archiver"}</button>
        <button class="btn sm ghost danger" onclick="UI.delFert('${f.id}')">Suppr.</button></td></tr>`;}).join("");
    return `
    <div class="page-head"><div><h1>Engrais & prix</h1>
      <p>Chaque engrais a son unité d'application et son unité commerciale : l'application choisit seule la bonne conversion.
      Exemple : 400 €/t × densité 1,30 ÷ 1000 = 0,52 €/L. L'historique conserve tous les prix proposés.</p></div>
      <div class="actions"><button class="btn pri" onclick="UI.addFert('fond')">＋ Ajouter un engrais</button></div></div>
    ${classement}
    <div class="card"><div class="tb-wrap"><table class="tb"><thead><tr>
      <th>Engrais</th><th>Application</th><th>Unité prix</th><th class="num">Prix</th><th class="num">Prix converti</th>
      <th class="num" style="color:var(--green)">Prix de l'unité N</th>
      <th class="num">Densité</th><th>MAJ prix</th><th>Historique</th><th>Actions</th>
      </tr></thead><tbody>${rows}</tbody></table></div></div>
    <div class="hint" style="margin-top:10px">Un engrais utilisé dans une campagne doit être <b>archivé</b> plutôt que supprimé : il sort des saisies mais l'historique est conservé.</div>`;
  },
  fertForm(f={}) {
    const opt=(list,cur)=>Object.entries(list).map(([v,l])=>`<option value="${v}" ${v===(cur||"")?"selected":""}>${l}</option>`).join("");
    return `<div class="frow">
      <div class="field"><label>Nom de l'engrais *</label><input id="m-name" value="${f.name||""}"></div>
      <div class="field"><label>Catégorie</label><select id="m-cat">
        <option value="fond" ${f.cat!=="azote"?"selected":""}>Engrais de fond</option>
        <option value="azote" ${f.cat==="azote"?"selected":""}>Azote</option></select></div></div>
    <div class="frow">
      <div class="field"><label>Unité d'application</label><select id="m-app">${opt({"kg/ha":"kg/ha","t/ha":"t/ha","l/ha":"l/ha","u/ha":"unités/ha","dose/ha":"doses/ha"},f.appUnit||"kg/ha")}</select></div>
      <div class="field"><label>Unité commerciale du prix</label><select id="m-pu">${opt(PRICE_UNITS,f.priceUnit||"t")}</select></div></div>
    <div class="frow">
      <div class="field"><label>Prix</label><input id="m-price" type="number" step="0.01" value="${f.price??""}"></div>
      <div class="field"><label>Densité (kg/L) — requise si appliqué en l/ha et acheté au poids</label><input id="m-dens" type="number" step="0.01" value="${f.density??""}" placeholder="1.30"></div></div>
    <div class="frow">
      <div class="field"><label>Teneur en azote — kg N/L (solutions) ou kg N/kg (solides) · engrais azotés</label><input id="m-tenor" type="number" step="0.001" value="${f.tenor??""}" placeholder="0.39 ou 0.335"></div>
      <div class="field"></div></div>
    <div class="frow">
      <div class="field"><label>Fournisseur</label><input id="m-sup" value="${f.supplier||""}"></div>
      <div class="field"><label>Composition</label><input id="m-comp" value="${f.composition||""}"></div></div>
    <div class="field"><label>Commentaire</label><input id="m-cmt" value="${f.comment||""}"></div>`;
  },
  readFertForm(f) {
    const name=this.mval("m-name");
    if(!name){ this.toast("Un nom est requis"); return false; }
    const price=this.mnum("m-price");
    if(price!=null&&price<0){ this.toast("Prix négatif interdit"); return false; }
    const dens=this.mnum("m-dens");
    if(dens!=null&&dens<=0){ this.toast("La densité doit être positive"); return false; }
    const tenor=this.mnum("m-tenor");
    if(tenor!=null&&(tenor<=0||tenor>1)){ this.toast("Teneur invalide (ex. 0,39 ou 0,335)"); return false; }
    const app=this.mval("m-app"), pu=this.mval("m-pu");
    const tmp={ appUnit:app, priceUnit:pu, price:price||0, density:dens };
    if(price>0){ const up=FERT.unitPrice(tmp); if(!up.ok&&up.reason.startsWith("Unités")){ this.toast("⚠ "+up.reason); return false; } }
    Object.assign(f,{ name, cat:this.mval("m-cat"), appUnit:app, priceUnit:pu,
      density:dens, tenor, supplier:this.mval("m-sup"), composition:this.mval("m-comp"), comment:this.mval("m-cmt") });
    if(price!=null&&price!==f.price){
      f.price=price; f.priceUpdated=today();
      (f.history=f.history||[]).push({ id:uid(), date:today(), supplier:f.supplier, price, unit:pu, qty:"", comment:"", retained:true });
    }
    return true;
  },
  addFert(cat) {
    this.modal("Nouvel engrais",this.fertForm({cat,density:null}),()=>{
      const f={ id:uid(), tenor:null, active:true, history:[], stock:0, cur:null, tgt:null, low:null, high:null, decision:"Surveiller", pct:0, priceUpdated:today() };
      if(this.readFertForm(f)===false) return false;
      Store.mutate(c=>c.fertilizers.push(f));
      this.toast("Engrais créé — il apparaît dans Cultures, Fond, Prévisionnel et exports"); },"Créer");
  },
  editFert(id) {
    const f=Store.camp.fertilizers.find(x=>x.id===id);
    this.modal("Modifier « "+f.name+" »",this.fertForm(f),()=>{
      let ok; Store.mutate(()=>{ ok=this.readFertForm(f); },true);
      if(ok===false) return false; Store.persist(); UI.render(); });
  },
  dupFert(id) {
    Store.mutate(c=>{ const f=c.fertilizers.find(x=>x.id===id);
      const copy=JSON.parse(JSON.stringify(f)); copy.id=uid(); copy.name=f.name+" (copie)"; copy.history=[];
      c.fertilizers.splice(c.fertilizers.indexOf(f)+1,0,copy); });
    this.toast("Engrais dupliqué");
  },
  toggleFert(id){ Store.mutate(c=>{ const f=c.fertilizers.find(x=>x.id===id); f.active=f.active===false; }); },
  delFert(id) {
    const c=Store.camp, f=c.fertilizers.find(x=>x.id===id);
    const used = Object.values(Store.data.campaigns).some(cc=>
      cc.cultures.some(cu=>+cu.fond?.[id]>0) || cc.parcels.some(p=>p.fOv?.[id]!=null) || cc.purchases.some(b=>b.fert===id))
      || f.id==="sol39" || f.id==="n33";
    this.modal("Supprimer « "+f.name+" »",
      used?`<p class="hint">⚠ Cet engrais est <b>utilisé dans une campagne</b> (doses, achats ou azote). La suppression casserait l'historique : préférez <b>Archiver</b>.</p>`
          :`<p class="hint">Suppression définitive de l'engrais et de son historique de prix.</p>`,
      ()=>{ if(used){ Store.mutate(cc=>{ f.active=false; }); this.toast("Engrais archivé (utilisé dans une campagne)"); }
        else { Store.mutate(cc=>{ cc.fertilizers.splice(cc.fertilizers.indexOf(f),1); }); this.toast("Engrais supprimé"); } },
      used?"Archiver":"Supprimer");
  },
  fertHistory(id) {
    const f=Store.camp.fertilizers.find(x=>x.id===id), h=FERT.histStats(f);
    const rows=(f.history||[]).slice().sort((a,b)=>(b.date||"").localeCompare(a.date||"")).map(x=>`<tr>
      <td>${x.date||"—"}</td><td>${x.supplier||"—"}</td><td class="num"><b>${fmt(x.price,2)}</b> ${PRICE_UNITS[x.unit]||""}</td>
      <td>${x.qty||"—"}</td><td>${x.retained?'<span class="chip sig-g"><i></i>Retenu</span>':'<span class="chip sig-n"><i></i>Non retenu</span>'}</td>
      <td class="muted">${x.comment||""}</td></tr>`).join("");
    this.modal("Historique des prix — "+f.name,
      `${h?`<p class="hint" style="margin-bottom:10px">Dernier : <b>${fmt(h.last)}</b> (${h.lastDate}) · meilleur : <b>${fmt(h.best)}</b> · moyen : <b>${fmt(h.avg)}</b>
        ${h.delta!=null?" · écart vs précédent : <b>"+(h.delta>0?"+":"")+fmt(h.delta)+"</b>":""} · ${h.count} relevé(s)</p>`:""}
      <div style="max-height:38vh;overflow:auto"><table class="tb"><thead><tr>
      <th>Date</th><th>Fournisseur</th><th class="num">Prix</th><th>Qté proposée</th><th>Décision</th><th>Commentaire</th></tr></thead>
      <tbody>${rows||'<tr><td colspan="6" class="empty">Aucun relevé</td></tr>'}</tbody></table></div>
      <div style="border-top:1px solid var(--line);margin-top:12px;padding-top:12px">
      <b style="font-size:13px">Ajouter un relevé de prix</b>
      <div class="frow" style="margin-top:8px">
        <div class="field"><label>Date</label><input id="mh-date" type="date" value="${today()}"></div>
        <div class="field"><label>Fournisseur</label><input id="mh-sup" value="${f.supplier||""}"></div></div>
      <div class="frow">
        <div class="field"><label>Prix (${PRICE_UNITS[f.priceUnit]})</label><input id="mh-price" type="number" step="0.01"></div>
        <div class="field"><label>Quantité proposée</label><input id="mh-qty"></div></div>
      <div class="frow">
        <div class="field"><label>Commentaire</label><input id="mh-cmt"></div>
        <div class="field"><label>Prix retenu ?</label><select id="mh-ret"><option value="1">Oui — devient le prix de l'engrais</option><option value="0">Non — simple relevé</option></select></div></div></div>`,
      ()=>{ const price=this.mnum("mh-price");
        if(price==null){ this.closeModal(); return; }
        if(price<=0){ this.toast("Prix invalide"); return false; }
        const retained=this.mval("mh-ret")==="1";
        Store.mutate(c=>{ f.history.push({ id:uid(), date:this.mval("mh-date"), supplier:this.mval("mh-sup"),
            price, unit:f.priceUnit, qty:this.mval("mh-qty"), comment:this.mval("mh-cmt"), retained });
          if(retained){ f.price=price; f.priceUpdated=this.mval("mh-date"); } });
        this.toast(retained?"Prix retenu — tous les coûts sont recalculés":"Relevé ajouté à l'historique"); },
      "Ajouter le relevé");
  },

  /* ---------- PRÉVISIONNEL D'ACHAT ---------- */
  pg_prev() {
    const c=Store.camp, fv=CALC.fertView(c), surf=CALC.surfTot(c)||1;
    const mg=CALC.margins(c,null);
    const cards=fv.map(x=>{ const f=x.f, up=x.up;
      return `<div class="card"><div class="hd"><h2>${f.name}</h2>${this.signal(x.signal)}</div><div class="bd">
      <div style="display:flex;gap:18px;flex-wrap:wrap;margin-bottom:10px">
        <div><div style="font-size:10.5px;letter-spacing:.8px;text-transform:uppercase;color:var(--tx-3);font-weight:700">Besoin</div>
          <div style="font-size:19px;font-weight:800">${fmt(x.need)} ${APP_UNITS[f.appUnit]}</div>
          <div class="muted" style="font-size:12px">${x.tons!=null?"= "+fmt(x.tons,1)+" t":""}</div></div>
        <div><div style="font-size:10.5px;letter-spacing:.8px;text-transform:uppercase;color:var(--tx-3);font-weight:700">Reste à acheter</div>
          <div style="font-size:19px;font-weight:800;color:${x.left>0?"var(--orange)":"var(--green)"}">${x.left!=null?fmt(x.left,1)+" t":"—"}</div>
          <div class="muted" style="font-size:12px">${x.cover!=null?"couverture "+fmt(x.cover*100)+" %":""}</div></div>
        <div><div style="font-size:10.5px;letter-spacing:.8px;text-transform:uppercase;color:var(--tx-3);font-weight:700">Coût du besoin</div>
          <div style="font-size:19px;font-weight:800">${x.needCost.ok?eur(Math.round(x.needCost.cost)):MISS}</div>
          <div class="muted" style="font-size:12px">${x.needCost.ok?eurHa(x.needCost.cost/surf)+" moy.":""}</div></div>
      </div>
      ${x.cover!=null?`<div class="bar-row" style="grid-template-columns:110px 1fr 60px"><span>Couverture</span>
        <div class="tr"><i style="width:${Math.min(100,x.cover*100)}%;background:${x.cover>=1?"var(--green)":"var(--orange)"}"></i></div>
        <span class="vv">${fmt(x.cover*100)} %</span></div>`:""}
      <table class="tb" style="margin-top:8px"><tbody>
      <tr><td class="muted">Prix ${PRICE_UNITS[f.priceUnit]}</td><td class="num">${this.inp("fertilizers",f.id,"price",f.price,{w:70})}</td>
          <td class="muted">Prix converti</td><td class="num calc">${up.ok?(up.label||"forfait"):'<span class="miss">'+up.reason+'</span>'}</td></tr>
      <tr><td class="muted">Stock (t)</td><td class="num">${this.inp("fertilizers",f.id,"stock",f.stock,{w:70})}</td>
          <td class="muted">Sécurisé</td><td class="num calc">${fmt(x.secured,1)} t${x.pmp?` <span class="muted">@ ${fmt(x.pmp)} €/t (${eur(Math.round(x.spent))})</span>`:""}</td></tr>
      <tr><td class="muted">Prix actuel €/t</td><td class="num">${this.inp("fertilizers",f.id,"cur",f.cur,{w:70})}</td>
          <td class="muted">Prix cible €/t</td><td class="num">${this.inp("fertilizers",f.id,"tgt",f.tgt,{w:70})}</td></tr>
      ${x.scn?`<tr><td class="muted">Scénarios €/t</td><td class="num">${this.inp("fertilizers",f.id,"low",f.low,{w:58})}</td>
          <td class="num muted" style="text-align:center">réf. ${fmt(f.price)}</td><td class="num">${this.inp("fertilizers",f.id,"high",f.high,{w:58})}</td></tr>
      <tr><td class="muted">Coût scénarios</td><td class="num calc">${eur(x.scn.low)}</td><td class="num calc">${eur(x.scn.mid)}</td><td class="num calc">${eur(x.scn.high)}</td></tr>`:""}
      <tr><td class="muted">Coût restant</td><td class="num calc">${x.remainCost!=null?eur(x.remainCost):"—"}</td>
          <td class="muted">Économies</td><td class="num calc">réal. ${eur(x.ecoDone)} · pot. ${eur(x.ecoPot)}</td></tr>
      <tr><td class="muted">Décision</td><td colspan="2">${this.sel("fertilizers",f.id,"decision",f.decision,
        ["Acheter maintenant","Attendre","Sécuriser une partie","Surveiller"].map(d=>({v:d,l:d})))}</td>
        <td class="num">${this.inp("fertilizers",f.id,"pct",f.pct,{w:52})} %</td></tr>
      </tbody></table>
      <div style="margin-top:8px;display:flex;gap:8px"><button class="btn sm" onclick="UI.fertHistory('${f.id}')">Historique prix</button></div>
      </div></div>`;}).join("");
    const tf=key=>fv.reduce((s,x)=>s+(x.scn?x.scn[key]??x.scn.mid:(x.needCost.ok?Math.round(x.needCost.cost):0)),0);
    const totLow=tf("low"), totMid=tf("mid"), totHigh=tf("high");
    const sol=fv.find(x=>x.f.id==="sol39"), n33=fv.find(x=>x.f.id==="n33");
    const sens=[20,50,100].map(h=>{ const i1=Math.round((sol.left||0)*h), i2=Math.round((n33.left||0)*h);
      return `<tr><td>+${h} €/t</td><td class="num">${eur(i1)}</td><td class="num">${eur(i2)}</td>
      <td class="num calc">${eur(i1+i2)}</td><td class="num muted">${eurHa((i1+i2)/surf)}</td></tr>`;}).join("");
    const mgRows=mg.map(m=>{ const risk=m.margin<0?"r":m.margin<150?"a":"g";
      return `<tr><td><b>${m.cu.name}</b></td><td class="num">${fmt(m.area,2)}</td><td class="num">${eur(m.pb)}</td>
      <td class="num">${eur(Math.round(m.seedHa))}</td><td class="num">${eur(Math.round(m.phytoHa))}</td><td class="num">${eur(m.autres)}</td>
      <td class="num" style="font-weight:700">${eur(Math.round(m.fertHa))}</td>
      <td class="num calc" style="font-weight:800;color:${m.margin<0?"var(--red)":"inherit"}">${eur(Math.round(m.margin))}</td>
      <td class="num muted">${m.seuil?fmt(m.seuil)+" €/t":"—"}</td><td>${this.signal(risk)}</td></tr>`;}).join("");
    const margeTot=mg.reduce((s,m)=>s+m.margin*m.area,0);
    const journal=c.purchases.slice().sort((a,b)=>(b.date||"").localeCompare(a.date||"")).map(b=>{
      const f=CALC.fert(c,b.fert);
      return `<tr><td>${b.date||"—"}</td><td><b>${f?.name||"?"}</b></td><td>${b.supplier||"—"}</td>
      <td class="num">${fmt(b.qty,1)} t</td><td class="num">${fmt(b.price)} €/t</td>
      <td class="num calc">${eur(Math.round((+b.qty||0)*(+b.price||0)))}</td><td>${b.place||"—"}</td><td class="muted">${b.comment||""}</td>
      <td><button class="btn sm ghost danger" onclick="UI.delPurchase('${b.id}')">✕</button></td></tr>`;}).join("");
    return `
    <div class="page-head"><div><h1>Prévisionnel d'achat</h1>
      <p>Quand acheter, combien, à quel prix. Prix saisis dans leur unité commerciale, conversions et impacts automatiques. Sécurisé & PMP issus du journal.</p></div>
      <div class="actions"><button class="btn" onclick="UI.go('eng')">Engrais & prix</button>
      <button class="btn pri" onclick="UI.addPurchase()">＋ Enregistrer un achat</button></div></div>
    <div class="grid g2" style="margin-bottom:16px">${cards}</div>
    <div class="grid g2" style="margin-bottom:16px">
      <div class="card"><div class="hd"><h2>Coût d'achat selon les scénarios</h2><span class="sub">sécurisé au PMP + reste au prix du scénario</span></div>
        <div class="bd">${CHARTS.bars([{label:"Prix bas",value:totLow,color:"var(--green)"},
          {label:"Prix référence",value:totMid,color:"var(--amber)"},{label:"Prix haut",value:totHigh,color:"var(--red)"}])}
        <div class="hint">Écart haut − bas : <b>${eur(totHigh-totLow)}</b>, soit <b>${eurHa((totHigh-totLow)/surf)}</b>.</div></div></div>
      <div class="card"><div class="hd"><h2>Si l'azote augmente…</h2><span class="sub">impact sur le reste à acheter</span></div>
        <div class="tb-wrap"><table class="tb"><thead><tr><th>Hausse</th><th class="num">Sol. 39</th><th class="num">N33</th><th class="num">Total</th><th class="num">€/ha</th></tr></thead>
        <tbody>${sens}</tbody></table></div></div>
    </div>
    <div class="card" style="margin-bottom:16px"><div class="hd"><h2>Impact par culture — marges €/ha</h2><span class="sub">aux prix engrais actuels</span></div>
      <div class="tb-wrap"><table class="tb"><thead><tr>
      <th>Culture</th><th class="num">ha</th><th class="num">Produit brut</th><th class="num">Semences</th><th class="num">Phyto</th>
      <th class="num">Autres</th><th class="num">Engrais</th><th class="num">Marge</th><th class="num">Seuil</th><th>Risque</th>
      </tr></thead><tbody>${mgRows}
      <tr class="tot"><td colspan="7">MARGE EXPLOITATION</td><td class="num">${eur(Math.round(margeTot))}</td><td colspan="2" class="muted">${eurHa(margeTot/surf)}</td></tr>
      </tbody></table></div></div>
    <div class="card"><div class="hd"><h2>Journal des achats</h2><span class="sub">${c.purchases.length} achat(s) — alimente PMP et % sécurisé</span></div>
      <div class="tb-wrap"><table class="tb"><thead><tr>
      <th>Date</th><th>Produit</th><th>Fournisseur</th><th class="num">Quantité</th><th class="num">Prix</th><th class="num">Montant</th><th>Lieu</th><th>Commentaire</th><th></th>
      </tr></thead><tbody>${journal||'<tr><td colspan="9" class="empty">Aucun achat enregistré.</td></tr>'}</tbody></table></div></div>`;
  },
  addPurchase() {
    const c=Store.camp;
    this.modal("Enregistrer un achat d'engrais",
      `<div class="frow">
      <div class="field"><label>Date</label><input id="m-date" type="date" value="${today()}"></div>
      <div class="field"><label>Produit</label><select id="m-fert">${c.fertilizers.filter(f=>f.active!==false).map(f=>`<option value="${f.id}">${f.name}</option>`).join("")}</select></div></div>

  /* ---------- INTERVENTIONS : planning par programmes ---------- */

      .map(([k,l])=>`<button class="${this.phView===k?"on":""}" onclick="UI.phView='${k}';UI.render()">${l}</button>`).join("")}</div>`;
    const body = this.phView==="periode"?this.phByPeriod(views)
      : this.phView==="culture"?this.phByCult(views)
      : this.phView==="parcelle"?this.phByParcel(views)
      : this.phView==="cal"?this.phCalendar(views)

    return `

      <div class="kpi" style="--k:var(--orange)"><div class="l">Coût sélection</div><div class="v">${eur(views.filter(v=>v.pg.status!=="Annulée").reduce((s,v)=>s+v.cost,0))}</div><div class="s">prévisionnel campagne : ${eur(ph.cost)}</div></div>
      <div class="kpi" style="--k:var(--green)"><div class="l">Coût réalisé</div><div class="v">${eur(ph.realCost)}</div><div class="s">écart prévu/réalisé conservé par programme</div></div>
      <div class="kpi" style="--k:#8C5E2A"><div class="l">Produits à acheter (sélection)</div><div class="v">${needs.filter(b=>b.left>0).length}</div><div class="s">voir synthèse en bas de page</div></div>
    </div>
    ${alerts.length?`<div class="alertbox no-print"><b>⚠ ${alerts.length} point(s) à vérifier</b><ul>${alerts.slice(0,8).map(a=>`<li>${a}</li>`).join("")}</ul>${alerts.length>8?'<div class="muted">…</div>':""}</div>`:""}
    ${filters}${tabs}${body}
    ${this.phNeeds(needs)}`;
  },
  progCard(v) {
    const c=Store.camp, pg=v.pg;
    const cu=CALC.cult(c,pg.cult), vari=pg.vari?CALC.vari(c,pg.vari)?.name:"Toutes variétés";
    const lines=v.lines.map(x=>`<tr><td><b>${x.prod?.name||"?"}</b> <span class="tag">${x.l.type||""}</span></td>
      <td class="num">${x.l.dose??'<span class="miss">dose ?</span>'} ${x.prod?.unit||""}/ha</td>
      <td class="num calc">${x.qty!=null?fmt(x.qty,2)+" "+(x.prod?.unit||""):"—"}</td>
      <td class="num muted">${x.costHa!=null?fmt(x.costHa,1)+" €/ha":""}</td>
      <td class="num calc">${x.priced?eur(x.cost):MISS}</td>
      <td class="muted">${x.l.note||""}</td></tr>`).join("");
    const real=pg.real?`<div class="p-real">✅ Réalisé le <b>${pg.real.date||"?"}</b>${pg.real.area!=null?" · "+fmt(pg.real.area,2)+" ha traités":""}
      · coût réel <b>${eur(v.realCost)}</b> (écart ${v.gap>0?"+":""}${eur(v.gap)})${pg.real.comment?" · "+pg.real.comment:""}${pg.real.reason?" · écart : "+pg.real.reason:""}</div>`:"";
    return `<div class="pgcard">
      <div class="p-hd"><span style="width:10px;height:10px;border-radius:3px;background:${cu?.color||"#999"};display:inline-block"></span>
        <b>${pg.period||"Période non renseignée"} — ${cu?.name||"?"} — ${vari}</b>
        ${stchip(pg.status)}
        <span class="p-meta">${v.parcels.length} parcelle(s) · ${fmt(v.area,2)} ha · ${pg.lines.length} produit(s)
        · ${fmt(v.costHa,1)} €/ha · <b>${eur(v.cost)}</b>${pg.datePlan?" · prévu le "+pg.datePlan:""}</span>
        <span class="p-act no-print">
          <button class="btn sm" onclick="UI.progDetail('${pg.id}')">Détail</button>
          <button class="btn sm" onclick="UI.editProgram('${pg.id}')">Modifier</button>
          <button class="btn sm" onclick="UI.dupProgram('${pg.id}')">Dupliquer</button>
          ${pg.status!=="Réalisée"?`<button class="btn sm grn" onclick="UI.doneProgram('${pg.id}')">Réalisé</button>`:""}
          <select class="ed" style="border:1px solid var(--line);border-radius:7px;padding:3px 5px;font-size:12px"
            onchange="UI.set('programs','${pg.id}','status',this.value,false)">
            ${STATUSES.map(s=>`<option ${s===pg.status?"selected":""}>${s}</option>`).join("")}</select>
          <button class="btn sm ghost danger" onclick="UI.delProgram('${pg.id}')">✕</button></span></div>
      <div class="tb-wrap"><table class="tb"><thead><tr><th>Produit</th><th class="num">Dose</th><th class="num">Quantité totale</th><th class="num">Coût/ha</th><th class="num">Coût</th><th>Note</th></tr></thead>
      <tbody>${lines}</tbody></table></div>${real}</div>`;
  },
  phByPeriod(views) {
    const c=Store.camp, po=CALC.periodOrder(c);
    const groups={};
    views.forEach(v=>{ (groups[v.pg.period||"Période non renseignée"] ||= []).push(v); });
    const keys=Object.keys(groups).sort((a,b)=>(po[a]??99)-(po[b]??99));
    if(!keys.length) return `<div class="card"><div class="empty"><b>Aucun programme</b>Modifiez les filtres ou créez un programme d'intervention.</div></div>`;
    return keys.map(k=>{ const g=groups[k];
      const cost=g.reduce((s,v)=>s+(v.pg.status!=="Annulée"?v.cost:0),0);
      const area=g.reduce((s,v)=>s+v.area,0);
      return `<div class="period-h">${k}<span class="tag">${g.length} programme(s) · ${fmt(area,1)} ha · ${eur(cost)}</span></div>`
        + g.map(v=>this.progCard(v)).join(""); }).join("");
  },
  phByCult(views) {
    const c=Store.camp, po=CALC.periodOrder(c);
    const groups={};
    views.forEach(v=>{ (groups[v.pg.cult||"?"] ||= []).push(v); });
    return Object.entries(groups).map(([cid,g])=>{
      const cu=CALC.cult(c,cid);
      g.sort((a,b)=>(po[a.pg.period]??99)-(po[b.pg.period]??99));
      return `<div class="period-h"><span style="width:12px;height:12px;border-radius:3px;background:${cu?.color||"#999"}"></span>
        ${cu?.name||"?"}<span class="tag">${g.length} programme(s) · ${eur(g.reduce((s,v)=>s+v.cost,0))}</span></div>`
        + g.map(v=>this.progCard(v)).join(""); }).join("")
      || `<div class="card"><div class="empty"><b>Aucun programme</b></div></div>`;
  },
  phByParcel(views) {
    const c=Store.camp, po=CALC.periodOrder(c);
    const perP={};
    views.forEach(v=>v.parcels.forEach(p=>{ (perP[p.id] ||= { p, items:[] }).items.push(v); }));
    return Object.values(perP).map(({p,items})=>{
      items.sort((a,b)=>(po[a.pg.period]??99)-(po[b.pg.period]??99));
      const rows=items.flatMap(v=>v.lines.map(x=>`<tr><td>${v.pg.period}</td><td>${stchip(v.pg.status)}</td>
        <td><b>${x.prod?.name||"?"}</b></td><td class="num">${x.l.dose??"?"} ${x.prod?.unit||""}/ha</td>
        <td class="num calc">${x.l.dose!=null?fmt(x.l.dose*p.area,2)+" "+(x.prod?.unit||""):"—"}</td>
        <td class="num calc">${x.prod&&+x.prod.price>0&&x.l.dose!=null?eur(Math.round(x.l.dose*p.area*x.prod.price)):MISS}</td></tr>`)).join("");
      return `<div class="card" style="margin-bottom:12px"><div class="hd"><h2>${p.name}</h2>
        <span class="sub">${CALC.cult(c,p.cult)?.name||""} · ${fmt(p.area,2)} ha · ${items.length} passage(s)</span></div>
        <div class="tb-wrap"><table class="tb"><thead><tr><th>Période</th><th>Statut</th><th>Produit</th><th class="num">Dose</th><th class="num">Quantité</th><th class="num">Coût</th></tr></thead>
        <tbody>${rows}</tbody></table></div></div>`; }).join("")
      || `<div class="card"><div class="empty"><b>Aucune parcelle concernée</b></div></div>`;
  },
  calMonth: (new Date()).toISOString().slice(0,7),
  phCalendar(views) {
    const [y,m]=this.calMonth.split("-").map(Number);
    const first=new Date(y,m-1,1), start=(first.getDay()+6)%7, days=new Date(y,m,0).getDate();
    const dated=views.filter(v=>v.pg.datePlan&&v.pg.datePlan.slice(0,7)===this.calMonth);
    const undated=views.filter(v=>!v.pg.datePlan).length;
    let cells="";
    for(let i=0;i<start;i++) cells+='<div class="day off"></div>';
    for(let d=1;d<=days;d++){
      const ds=this.calMonth+"-"+String(d).padStart(2,"0");
      const evs=dated.filter(v=>v.pg.datePlan===ds)
        .map(v=>`<div class="ev" onclick="UI.progDetail('${v.pg.id}')" title="${v.pg.period} ${CALC.cult(Store.camp,v.pg.cult)?.name||""}">${v.pg.period} · ${CALC.cult(Store.camp,v.pg.cult)?.name||""}</div>`).join("");
      cells+=`<div class="day"><div class="dnum">${d}</div>${evs}</div>`;
    }
    const nav=(off)=>{ const d=new Date(y,m-1+off,1); return d.toISOString().slice(0,7); };
    return `<div class="card"><div class="hd"><h2>${first.toLocaleDateString("fr-FR",{month:"long",year:"numeric"})}</h2>
      <div class="no-print"><button class="btn sm" onclick="UI.calMonth='${nav(-1)}';UI.render()">←</button>
      <button class="btn sm" onclick="UI.calMonth='${nav(1)}';UI.render()">→</button></div></div>
      <div class="bd"><div class="cal">${["Lun","Mar","Mer","Jeu","Ven","Sam","Dim"].map(d=>`<div class="dayh">${d}</div>`).join("")}${cells}</div>
      <div class="hint">${undated?undated+" programme(s) sans date précise restent visibles dans la vue « Par période ».":"Tous les programmes filtrés ont une date."}</div></div></div>`;
  },
  phList(views) {
    const c=Store.camp;
    const rows=views.flatMap(v=>v.lines.map(x=>`<tr>
      <td>${v.pg.period}</td><td>${stchip(v.pg.status)}</td><td>${CALC.cult(c,v.pg.cult)?.name||""}</td>
      <td>${v.pg.vari?CALC.vari(c,v.pg.vari)?.name:"Toutes"}</td><td>${v.parcels.length} · ${fmt(v.area,1)} ha</td>
      <td><b>${x.prod?.name||"?"}</b></td><td class="num">${x.l.dose??"?"}</td>
      <td class="num calc">${x.qty!=null?fmt(x.qty,2):"—"}</td><td class="num calc">${x.priced?eur(x.cost):MISS}</td>
      <td>${v.pg.datePlan||"—"}</td><td class="muted">${x.l.note||v.pg.note||""}</td></tr>`)).join("");
    return `<div class="card"><div class="tb-wrap"><table class="tb"><thead><tr>
      <th>Période</th><th>Statut</th><th>Culture</th><th>Variété</th><th>Parcelles</th><th>Produit</th>
      <th class="num">Dose/ha</th><th class="num">Quantité</th><th class="num">Coût</th><th>Date prévue</th><th>Note</th>
      </tr></thead><tbody>${rows||'<tr><td colspan="11" class="empty">Aucune ligne</td></tr>'}</tbody></table></div></div>`;
  },
  phNeeds(needs) {
    if(!needs.length) return "";
    return `<div class="card" style="margin-top:16px"><div class="hd"><h2>Quantités à préparer / acheter (sélection filtrée)</h2>
      <button class="btn sm no-print" onclick="UI.buyList()">Générer la liste d'achat</button></div>
      <div class="tb-wrap"><table class="tb"><thead><tr>
      <th>Produit</th><th class="num">Quantité nécessaire</th><th>Stock dispo</th><th>Déjà commandé</th><th class="num">Reste à acheter</th>
      </tr></thead><tbody>${needs.map(b=>`<tr><td><b>${b.prod.name}</b></td>
      <td class="num calc">${fmt(b.qty,2)} ${b.prod.unit}</td>
      <td>${this.inp("products",b.prod.id,"stock",b.prod.stock,{w:66})}</td>
      <td>${this.inp("products",b.prod.id,"ordered",b.prod.ordered,{w:66})}</td>
      <td class="num" style="font-weight:750;${b.left>0?'color:var(--orange)':'color:var(--green)'}">${fmt(b.left,2)} ${b.prod.unit}</td></tr>`).join("")}
      </tbody></table></div></div>`;
  },
  buyList() {

    const needs=CALC.productNeeds(c,CALC.programs(c,this.phFilt)).filter(b=>b.left>0);
    const fl=Object.entries(this.phFilt).filter(([k,v])=>v).map(([k,v])=>k==="cult"?CALC.cult(c,v)?.name:k==="prod"?CALC.prod(c,v)?.name:v).join(" · ")||"Toute la campagne";

      <td class="num">${+b.prod.price>0?fmt(b.prod.price,2)+" €":"—"}</td>

      <tr class="tot"><td colspan="3">BUDGET</td><td class="num">${eur(needs.reduce((s,b)=>s+(+b.prod.price>0?Math.round(b.left*b.prod.price):0),0))}</td></tr></tbody></table>

  /* ---------- Éditeur de programme (multi-produits, sélection parcelles) ---------- */
  editProgram(id, presetDup) {
    const c=Store.camp;
    if(!c.products.length){ this.toast("Créez d'abord vos produits (bouton « Produits, prix & stocks »)"); this.editProducts(); return; }
    const pg = id ? c.programs.find(x=>x.id===id)
      : presetDup || { id:null, period:"", status:"Prévue", type:"Fongicide", cult:c.cultures[0].id, vari:"",
          parcels:null, datePlan:"", objective:"", trigger:"", note:"", real:null, lines:[] };
    const draft=JSON.parse(JSON.stringify(pg));
    if(!draft.lines.length) draft.lines.push({ id:uid(), prod:c.products[0].id, dose:null, type:draft.type||"Fongicide", note:"" });
    UI._draft=draft;
    const body=`
    <div class="frow">
      <div class="field"><label>Période / stade / passage *</label>
        <input id="mp-period" list="dl-periods" value="${draft.period||""}" placeholder="T1, Floraison, libre…">
        <datalist id="dl-periods">${c.periods.filter(p=>!p.archived).map(p=>`<option value="${p.name}">`).join("")}</datalist></div>
      <div class="field"><label>Statut</label><select id="mp-status">${STATUSES.map(s=>`<option ${s===draft.status?"selected":""}>${s}</option>`).join("")}</select></div></div>
    <div class="frow">
      <div class="field"><label>Culture</label><select id="mp-cult" onchange="UI.progFormRefresh()">
        ${c.cultures.map(cu=>`<option value="${cu.id}" ${cu.id===draft.cult?"selected":""}>${cu.name}</option>`).join("")}</select></div>
      <div class="field"><label>Variété</label><select id="mp-vari" onchange="UI.progFormRefresh()"></select></div></div>
    <div class="frow">
      <div class="field"><label>Parcelles</label><select id="mp-pmode" onchange="UI.progFormRefresh()">
        <option value="auto" ${!draft.parcels?"selected":""}>Toutes les parcelles correspondantes</option>
        <option value="manuel" ${draft.parcels?"selected":""}>Sélection manuelle</option></select></div>
      <div class="field"><label>Date prévue (facultatif)</label><input id="mp-date" type="date" value="${draft.datePlan||""}"></div></div>
    <div id="mp-pklist"></div>
    <div id="mp-summary" class="hint" style="margin:10px 0"></div>
    <b style="font-size:13px">Produits du programme</b>
    <div class="lines-ed" id="mp-lines" style="margin-top:8px"></div>
    <button class="btn sm" onclick="UI._draft.lines.push({id:'${""}'+Math.random().toString(36).slice(2,9),prod:'${c.products[0].id}',dose:null,type:'Fongicide',note:''});UI.progFormLines();UI.progFormSummary()">＋ Ajouter un produit</button>
    <div class="frow" style="margin-top:12px">
      <div class="field"><label>Objectif de l'intervention</label><input id="mp-obj" value="${draft.objective||""}"></div>
      <div class="field"><label>Conditions / déclencheur</label><input id="mp-trig" value="${draft.trigger||""}"></div></div>
    <div class="field"><label>Annotation</label><input id="mp-note" value="${draft.note||""}"></div>`;
    this.modal(id?"Modifier le programme":"Nouveau programme d'intervention",body,()=>{
      const period=this.mval("mp-period");
      if(!period){ this.toast("La période est obligatoire"); return false; }
      if(!draft.lines.length){ this.toast("Ajoutez au moins un produit"); return false; }
      Store.mutate(cc=>{
        if(!cc.periods.some(p=>p.name===period)) cc.periods.push({ id:uid(), name:period, archived:false });
        Object.assign(draft,{ period, status:this.mval("mp-status"), cult:this.mval("mp-cult"),
          vari:this.mval("mp-vari"), datePlan:this.mval("mp-date"),
          objective:this.mval("mp-obj"), trigger:this.mval("mp-trig"), note:this.mval("mp-note") });
        draft.parcels = this.mval("mp-pmode")==="manuel"
          ? [...document.querySelectorAll(".mpk:checked")].map(x=>x.dataset.id) : null;
        draft.type = draft.lines[0]?.type || "Autre";
        if(id){ Object.assign(pg,draft); }
        else { draft.id=uid(); cc.programs.push(draft); }
      });
      this.toast(id?"Programme mis à jour":"Programme créé");
    },id?"Enregistrer":"Créer le programme",true);
    this.progFormRefresh();
  },
  progFormRefresh() {
    const c=Store.camp, d=UI._draft;
    d.cult=this.mval("mp-cult")||d.cult;
    const variSel=document.getElementById("mp-vari");
    const vs=c.varieties.filter(v=>v.cult===d.cult);
    variSel.innerHTML=`<option value="">Toutes les variétés</option>`+vs.map(v=>`<option value="${v.id}" ${v.id===d.vari?"selected":""}>${v.name}</option>`).join("");
    d.vari=variSel.value;
    const mode=this.mval("mp-pmode");
    const box=document.getElementById("mp-pklist");
    if(mode==="manuel"){
      const cand=CALC.active(c).filter(p=>p.cult===d.cult&&(!d.vari||p.vari===d.vari));
      const all=CALC.active(c);

/* =====================================================================
   MODULE CARTO — mesures de surfaces & bornes fictives de projection
   Fond : orthophotos IGN (Géoplateforme, gratuit) — nécessite une connexion
   pour les images ; calculs et sauvegardes 100 % locaux.
   ===================================================================== */
const CARTO = {
  map:null, mode:null, pid:"", pts:[], vtx:[], poly:null,
  bornes:[], bLine:null, partA:null, partB:null, lastSplit:null,

  R:6371008.8,
  /** Surface géodésique (m²) d'un anneau [[lat,lng],...] — formule sphérique exacte */
  areaM2(ring){
    if(ring.length<3) return 0;
    const rad=Math.PI/180; let s=0;
    for(let i=0;i<ring.length;i++){
      const [la1,lo1]=ring[i], [la2,lo2]=ring[(i+1)%ring.length];
      s += (lo2-lo1)*rad * (2 + Math.sin(la1*rad) + Math.sin(la2*rad));
    }
    return Math.abs(s * this.R * this.R / 2);
  },
  ha(ring){ return this.areaM2(ring)/10000; },
  perim(ring){
    let d=0; const rad=Math.PI/180;
    for(let i=0;i<ring.length;i++){
      const a=ring[i], b=ring[(i+1)%ring.length];
      const dla=(b[0]-a[0])*rad, dlo=(b[1]-a[1])*rad;
      const h=Math.sin(dla/2)**2+Math.cos(a[0]*rad)*Math.cos(b[0]*rad)*Math.sin(dlo/2)**2;
      d += 2*this.R*Math.asin(Math.sqrt(h));
    }
    return d;
  },
  /* Projection locale équirectangulaire (précise à l'échelle parcellaire) */
  toXY(ring,lat0){ const k=Math.cos(lat0*Math.PI/180); return ring.map(([la,lo])=>[lo*k*111320,la*110574]); },
  toLL(xy,lat0){ const k=Math.cos(lat0*Math.PI/180); return xy.map(([x,y])=>[y/110574,x/(k*111320)]); },
  /** Découpe un polygone par la droite (P,dir) — retourne [côté gauche, côté droit] (Sutherland-Hodgman) */
  splitByLine(ring, A, B){
    const lat0=ring.reduce((s,p)=>s+p[0],0)/ring.length;
    const xy=this.toXY(ring,lat0), [ax,ay]=this.toXY([A],lat0)[0], [bx,by]=this.toXY([B],lat0)[0];
    const side=(p)=> (bx-ax)*(p[1]-ay)-(by-ay)*(p[0]-ax);
    const clip=(keep)=>{
      const out=[];
      for(let i=0;i<xy.length;i++){
        const p=xy[i], q=xy[(i+1)%xy.length], sp=side(p)*keep, sq=side(q)*keep;
        if(sp>=0) out.push(p);
        if((sp>0&&sq<0)||(sp<0&&sq>0)){
          const t=Math.abs(sp)/(Math.abs(sp)+Math.abs(sq));
          out.push([p[0]+(q[0]-p[0])*t, p[1]+(q[1]-p[1])*t]);
        }
      }
      return out;
    };
    return [this.toLL(clip(1),lat0), this.toLL(clip(-1),lat0)];
  },
  /** Positionne la ligne (parallèle à la direction actuelle) pour que le côté A = cible (ha) */
  autoPosition(ring, A, B, cibleHa){
    const lat0=ring.reduce((s,p)=>s+p[0],0)/ring.length;
    const xy=this.toXY(ring,lat0);
    const [ax,ay]=this.toXY([A],lat0)[0], [bx,by]=this.toXY([B],lat0)[0];
    let dx=bx-ax, dy=by-ay; const L=Math.hypot(dx,dy)||1; dx/=L; dy/=L;
    const nx=-dy, ny=dx;                                     // normale unitaire
    const proj=xy.map(p=>(p[0]-ax)*nx+(p[1]-ay)*ny);
    let lo=Math.min(...proj), hi=Math.max(...proj);
    const areaAt=t=>{
      const P=[ax+nx*t, ay+ny*t];
      const A2=this.toLL([P],lat0)[0], B2=this.toLL([[P[0]+dx*1000,P[1]+dy*1000]],lat0)[0];
      return { a:this.ha(this.splitByLine(ring,A2,B2)[0]), A2, B2 };
    };
    const croissant = areaAt(hi).a > areaAt(lo).a;
    for(let i=0;i<48;i++){
      const mid=(lo+hi)/2, a=areaAt(mid).a;
      if((a<cibleHa)===croissant) lo=mid; else hi=mid;
    }
    const r=areaAt((lo+hi)/2);
    return { A:r.A2, B:r.B2 };
  },

  parcel(){ return Store.camp.parcels.find(p=>p.id===this.pid); },
  mount(){
    const el=document.getElementById("map"); if(!el||this.mapEl===el) return;
    try{
      this.map=L.map(el,{zoomControl:true}).setView([48.245,3.155],13);   // nord Yonne par défaut
      const ign=L.tileLayer("https://data.geopf.fr/wmts?SERVICE=WMTS&REQUEST=GetTile&VERSION=1.0.0&LAYER=ORTHOIMAGERY.ORTHOPHOTOS&STYLE=normal&TILEMATRIXSET=PM&TILEMATRIX={z}&TILEROW={y}&TILECOL={x}&FORMAT=image/jpeg",
        {maxZoom:20, attribution:"© IGN Géoplateforme"});
      const osm=L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:19,attribution:"© OpenStreetMap"});
      ign.addTo(this.map);
      L.control.layers({ "Photo aérienne (IGN)":ign, "Plan (OSM)":osm }).addTo(this.map);
      this.map.on("click",e=>this.onClick(e));
      this.mapEl=el;
      const p=this.parcel();
      if(p&&p.geo) this.showParcel(p,true);
      this.redraw();
      if(navigator.onLine===false) UI.toast("Hors ligne : le fond de carte ne peut pas se charger (les calculs restent disponibles)");
    }catch(e){ el.innerHTML='<div class="empty"><b>Carte indisponible dans cet environnement</b>'+e.message+'</div>'; }
  },
  dot(cls){ return L.divIcon({className:"", html:'<div class="'+cls+'"></div>', iconSize:[16,16], iconAnchor:[8,8]}); },
  select(pid){ this.pid=pid; this.reset(); const p=this.parcel();
    if(p&&p.geo){ this.showParcel(p,true); } this.redraw(); },
  showParcel(p,fit){
    if(this._pl) this._pl.remove();
    if(p.geo){ this._pl=L.polygon(p.geo,{color:"#F57C00",weight:3,fillOpacity:.12}).addTo(this.map);
      if(fit) this.map.fitBounds(this._pl.getBounds().pad(0.3)); }
  },
  reset(){
    this.pts=[]; this.vtx.forEach(m=>m.remove()); this.vtx=[];
    if(this.poly){this.poly.remove();this.poly=null;}
    this.bornes.forEach(m=>m.remove()); this.bornes=[];
    if(this.bLine){this.bLine.remove();this.bLine=null;}
    if(this.partA){this.partA.remove();this.partA=null;}
    if(this.partB){this.partB.remove();this.partB=null;}
    this.lastSplit=null; this.mode=null; this.readout();
  },
  startDraw(){ if(!this.pid){UI.toast("Choisissez d'abord une parcelle");return;}
    this.reset(); this.mode="draw"; UI.toast("Cliquez les sommets de la parcelle sur la carte, puis « Terminer »"); },
  startBornes(){
    const p=this.parcel();
    if(!p||!p.geo){UI.toast("Cette parcelle n'a pas encore de contour : dessinez-le d'abord");return;}
    this.reset(); this.mode="bornes"; this.showParcel(p,true);
    UI.toast("Posez 2 bornes fictives : la ligne droite qui les relie découpe la parcelle");
  },
  onClick(e){
    if(this.mode==="draw"){
      this.pts.push([e.latlng.lat,e.latlng.lng]);
      const i=this.pts.length-1;
      const m=L.marker(e.latlng,{icon:this.dot("vtx"),draggable:true}).addTo(this.map);
      m.on("drag",ev=>{ this.pts[i]=[ev.latlng.lat,ev.latlng.lng]; this.drawPoly(); });
      this.vtx.push(m); this.drawPoly();
    } else if(this.mode==="bornes" && this.bornes.length<2){
      const idx=this.bornes.length;
      const m=L.marker(e.latlng,{icon:this.dot("borne"+(idx?" b2":"")),draggable:true}).addTo(this.map);
      m.on("drag",()=>this.applySplit());
      this.bornes.push(m);
      if(this.bornes.length===2) this.applySplit();
    }
  },
  drawPoly(){
    if(this.poly) this.poly.remove();
    if(this.pts.length>=2) this.poly=L.polygon(this.pts,{color:"#2E7D32",weight:3,fillOpacity:.15,dashArray:this.pts.length<3?"6":""}).addTo(this.map);
    this.readout();
  },
  undo(){ if(this.mode!=="draw"||!this.pts.length) return;
    this.pts.pop(); const m=this.vtx.pop(); if(m) m.remove(); this.drawPoly(); },
  finishDraw(){
    if(this.pts.length<3){UI.toast("Il faut au moins 3 sommets");return;}
    const p=this.parcel(), ha=Math.round(this.ha(this.pts)*100)/100;
    UI.modal("Enregistrer le contour — "+p.name,
      `<p class="hint">Surface mesurée : <b>${fmt(ha,2)} ha</b> (surface actuelle du parcellaire : ${fmt(p.area,2)} ha).
       Le contour sera enregistré sur la parcelle et inclus dans vos sauvegardes JSON.</p>
       <label style="display:flex;gap:8px;align-items:center;font-size:13.5px;margin-top:6px">
       <input type="checkbox" id="m-maj" checked> Mettre à jour la surface du parcellaire (${fmt(ha,2)} ha)</label>`,
      ()=>{ Store.mutate(c=>{ p.geo=this.pts.map(x=>[+x[0].toFixed(7),+x[1].toFixed(7)]);
          if(document.getElementById("m-maj").checked) p.area=ha; },true);
        UI.toast("Contour enregistré ✓"); this.reset(); this.showParcel(p,false); this.readout(); });
  },
  applySplit(){
    const p=this.parcel(); if(!p||!p.geo||this.bornes.length<2) return;
    const A=[this.bornes[0].getLatLng().lat,this.bornes[0].getLatLng().lng];
    const B=[this.bornes[1].getLatLng().lat,this.bornes[1].getLatLng().lng];
    const [g,d]=this.splitByLine(p.geo,A,B);
    if(this.bLine) this.bLine.remove();
    this.bLine=L.polyline([A,B],{color:"#fff",weight:3,dashArray:"8 6"}).addTo(this.map);
    if(this.partA) this.partA.remove(); if(this.partB) this.partB.remove();
    if(g.length>=3) this.partA=L.polygon(g,{color:"#2E7D32",weight:2,fillOpacity:.35}).addTo(this.map);
    if(d.length>=3) this.partB=L.polygon(d,{color:"#2C6E9E",weight:2,fillOpacity:.25}).addTo(this.map);
    this.lastSplit={A,B,g,d};
    this.readout();
  },
  auto(){
    const p=this.parcel(); const cible=+document.getElementById("carto-cible")?.value;
    if(!p||!p.geo){UI.toast("Dessinez d'abord le contour");return;}
    if(!(cible>0)){UI.toast("Indiquez la surface cible en ha");return;}
    if(this.bornes.length<2){UI.toast("Posez d'abord 2 bornes pour donner la direction de la ligne");return;}
    const A=[this.bornes[0].getLatLng().lat,this.bornes[0].getLatLng().lng];
    const B=[this.bornes[1].getLatLng().lat,this.bornes[1].getLatLng().lng];
    const r=this.autoPosition(p.geo,A,B,cible);
    this.bornes[0].setLatLng(r.A); this.bornes[1].setLatLng(r.B);
    this.applySplit();
    UI.toast("Ligne positionnée : partie verte = "+fmt(this.ha(this.lastSplit.g),2)+" ha");
  },
  validate(){
    const p=this.parcel();
    if(!this.lastSplit||!p){UI.toast("Aucune découpe à valider");return;}
    const {g,d,A,B}=this.lastSplit;
    const haG=Math.round(this.ha(g)*100)/100, haD=Math.round(this.ha(d)*100)/100;
    UI.modal("Valider la découpe — "+p.name,
      `<p class="hint">Bornes : <b>${A[0].toFixed(6)}, ${A[1].toFixed(6)}</b> et <b>${B[0].toFixed(6)}, ${B[1].toFixed(6)}</b> (coordonnées GPS à piqueter au champ).<br>
      Partie <b style="color:var(--green)">verte : ${fmt(haG,2)} ha</b> · partie <b style="color:var(--blue)">bleue : ${fmt(haD,2)} ha</b>.</p>
      <div class="field"><label>Nom de la nouvelle parcelle (partie verte)</label><input id="m-n2" value="${p.name} (division)"></div>
      <p class="hint">La parcelle actuelle est réduite à ${fmt(haD,2)} ha ; une nouvelle parcelle de ${fmt(haG,2)} ha est créée avec son contour. Culture, variété et réglages sont conservés sur les deux.</p>`,
      ()=>{ Store.mutate(c=>{
          const copy=JSON.parse(JSON.stringify(p));
          copy.id=uid(); copy.name=UI.mval("m-n2")||p.name+" (division)";
          copy.area=haG; copy.geo=g.map(x=>[+x[0].toFixed(7),+x[1].toFixed(7)]);
          p.area=haD; p.geo=d.map(x=>[+x[0].toFixed(7),+x[1].toFixed(7)]);
          c.parcels.splice(c.parcels.indexOf(p)+1,0,copy);
        },true);
        UI.toast("Division appliquée au parcellaire ✓");
        this.reset(); UI.render(); });
  },
  readout(){
    const el=document.getElementById("carto-read"); if(!el) return;
    const p=this.parcel();
    let h="";
    if(this.mode==="draw"&&this.pts.length>=3)
      h=`<span>Surface dessinée : <b style="color:var(--green)">${fmt(this.ha(this.pts),2)} ha</b></span>
         <span>Périmètre : <b>${fmt(this.perim(this.pts))} m</b></span><span class="muted">${this.pts.length} sommets</span>`;
    else if(this.mode==="draw") h=`<span class="muted">${this.pts.length} sommet(s) — cliquez sur la carte</span>`;
    else if(this.lastSplit)
      h=`<span>Partie verte : <b style="color:var(--green)">${fmt(this.ha(this.lastSplit.g),2)} ha</b></span>
         <span>Partie bleue : <b style="color:var(--blue)">${fmt(this.ha(this.lastSplit.d),2)} ha</b></span>
         <span class="muted">total ${fmt(this.ha(this.lastSplit.g)+this.ha(this.lastSplit.d),2)} ha — déplacez les bornes pour ajuster</span>`;
    else if(p&&p.geo) h=`<span>Contour enregistré : <b>${fmt(this.ha(p.geo),2)} ha</b></span><span class="muted">parcellaire : ${fmt(p.area,2)} ha</span>`;
    else h='<span class="muted">Choisissez une parcelle puis dessinez son contour, ou posez des bornes de projection.</span>';
    el.innerHTML=h;
  },
};

UI.pg_carto = function(){
  const c=Store.camp;
  const opts=CALC.active(c).map(p=>`<option value="${p.id}" ${p.id===CARTO.pid?"selected":""}>${p.name} — ${fmt(p.area,2)} ha${p.geo?" ✓":""}</option>`).join("");
  setTimeout(()=>{ CARTO.mapEl=null; CARTO.map=null; CARTO.mount(); },0);
  return `
  <div class="page-head"><div><h1>Carte & mesures</h1>
    <p>Dessinez le contour d'une parcelle sur la photo aérienne (surface géodésique exacte), ou posez des <b>bornes fictives</b> pour projeter une découpe en ligne droite — semis et irrigation cohérents — avant de la valider. Fond de carte IGN : connexion requise pour les images ; contours et calculs restent enregistrés localement.</p></div></div>
  <div class="carto-bar no-print">
    <select class="ed" style="border:1px solid var(--line);border-radius:9px;padding:8px 10px;background:#fff;min-width:220px"
      onchange="CARTO.select(this.value)"><option value="">— Parcelle du parcellaire —</option>${opts}</select>
    <button class="btn" onclick="CARTO.startDraw()">✏️ Dessiner le contour</button>
    <button class="btn sm" onclick="CARTO.undo()">↩ Annuler un point</button>
    <button class="btn grn sm" onclick="CARTO.finishDraw()">Terminer & enregistrer</button>
    <span style="width:1px;height:26px;background:var(--line)"></span>
    <button class="btn" onclick="CARTO.startBornes()">📍 Bornes de projection</button>
    <input id="carto-cible" class="num ed" type="number" step="0.01" placeholder="cible ha" style="width:86px">
    <button class="btn sm" onclick="CARTO.auto()">Positionner auto</button>
    <button class="btn pri sm" onclick="CARTO.validate()">Valider la découpe</button>
    <button class="btn ghost sm" onclick="CARTO.reset()">Effacer</button>
  </div>
  <div id="map"></div>
  <div class="carto-read" id="carto-read"></div>`;
};

/* ===================== Démarrage ===================== */
Store.load();
UI.renderShell();
UI.render();
if (Store.firstRun) UI.wizard();
if (!Storage.ok) UI.toast("Mode aperçu : sauvegarde désactivée — téléchargez le fichier et ouvrez-le dans votre navigateur");
</script>
